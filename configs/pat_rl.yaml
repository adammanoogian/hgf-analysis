# PAT-RL (Predator Avoidance Task — Reinforcement Learning variant)
# Single source of truth for task structure and analysis parameters.
# All PAT-RL phases and scripts read from this file via
# prl_hgf.env.pat_rl_config.load_pat_rl_config().
# This file is INDEPENDENT of configs/prl_analysis.yaml.

# ---------------------------------------------------------------------------
# Task structure
# ---------------------------------------------------------------------------
task:
  name: pat_rl
  description: >
    Predator Avoidance Task — Reinforcement Learning variant. Binary
    safe/dangerous context state, approach/avoid action, 2x2 reward/shock
    magnitude design, hazard-driven reversals. 192 trials across 4 runs.
  n_trials: 192
  n_runs: 4
  trials_per_run: 48

  # Hazard-rate-driven reversal. SVVS run order: stable-volatile-volatile-stable.
  # Klaassen et al. 2021 (Scientific Reports, doi:10.1038/s41598-021-90968-z).
  hazards:
    stable: 0.03
    volatile: 0.10
  run_order: ["stable", "volatile", "volatile", "stable"]

  # Outcome contingencies given state (consumer-study specification):
  # state=safe    (0): P(reward|approach)=0.70, P(shock|approach)=0.10,
  #                    P(nothing|approach)=0.20
  # state=dangerous(1): P(reward|approach)=0.10, P(shock|approach)=0.70,
  #                     P(nothing|approach)=0.20
  # avoid action: P(reward|avoid)=0.10, P(shock|avoid)=0.10, P(nothing|avoid)=0.80
  #   NOTE (Plan 20-01): The avoid block is stored in config for documentation
  #   and downstream logp use. Plans 20-02/20-03 wire stochastic avoid outcomes
  #   into the logp and scan body; the current Model A logp treats avoid as no-outcome.
  contingencies:
    safe:
      reward: 0.70
      shock: 0.10
      nothing: 0.20
    dangerous:
      reward: 0.10
      shock: 0.70
      nothing: 0.20
    avoid:
      reward: 0.10
      shock: 0.10
      nothing: 0.80

  # 2x2 reward/shock magnitude design crossed within-subject per trial.
  # Each trial drawn uniformly at random from the 4 cells.
  magnitudes:
    reward_levels: [1, 3]
    shock_levels: [1, 3]

  # Trial timing in seconds (needed for trajectory export outcome_time_s).
  timing:
    cue_duration_s: 1.5
    anticipation_s: 5.5
    outcome_duration_s: 2.0
    iti_s: 2.0
    # total per trial = 11.0 s nominal; run gap = 15.0 s

  # Delta-HR stub distribution (caller may override with real data).
  # anticipatory bradycardia: N(-3, 3) on dangerous anticipation,
  # N(0, 3) on safe anticipation; hard bounds [-15, 10] bpm.
  delta_hr_stub:
    dangerous: {mean: -3.0, sd: 3.0}
    safe: {mean: 0.0, sd: 3.0}
    bounds: [-15.0, 10.0]

# ---------------------------------------------------------------------------
# Simulation parameters — phenotype 2x2 grid (anxiety x reward_sensitivity)
#
# Phenotype priors match the HEART2ADAPT consumer-study spec (sister repo
# docs/files/GSD_heart2adapt_sim.yaml, tasks H2A.1.2 + H2A.1.4). Values
# marked TODO:consumer-spec are placeholders pending downstream confirmation.
#
# Computational grounding: Klaassen et al. 2024 (Communications Biology,
# doi:10.1038/s42003-024-06267-6) — approach-avoidance under threat x HGF.
# omega_2: higher (less negative) = faster updating = anxiety direction.
# beta: higher = more reward-driven.
# ---------------------------------------------------------------------------
simulation:
  n_participants_per_phenotype: 40   # SC5: 4 phenotypes × 40 = 160 agents for PRL-V1/V2 formal gates (Phase 20-07)
  master_seed: 5678

  # Phenotype 2x2 grid (anxiety x reward_sensitivity).
  # Keys must match _REQUIRED_PHENOTYPE_KEYS in pat_rl_config.py exactly.
  phenotypes:
    healthy:
      omega_2: {mean: -3.0, sd: 0.5}
      omega_3: {mean: -4.0, sd: 0.5}
      kappa:   {mean:  1.0, sd: 0.25}
      mu3_0:   {mean:  1.0, sd: 0.3}
      theta:   {mean:  0.005, sd: 0.002}
      beta:    {mean:  2.0, sd: 0.5}
      b:       {mean:  0.0, sd: 0.5}        # SC1 mean; sd=0.5 placeholder  TODO:consumer-spec b.sd
      dhr_mean: -2.0                          # SC1 (H2A.1.2): healthy Δhr ~ N(-2, 0.5)
      dhr_sd:    0.5                          # SC1 (H2A.1.2)
      epsilon2_coupling_coef: 0.3             # placeholder: larger PE → more bradycardia (Klaassen 2024)  TODO:consumer-spec epsilon2_coupling_coef
    reward_susceptible:
      omega_2: {mean: -3.0, sd: 0.5}
      omega_3: {mean: -4.0, sd: 0.5}
      kappa:   {mean:  1.0, sd: 0.25}
      mu3_0:   {mean:  1.0, sd: 0.3}
      theta:   {mean:  0.005, sd: 0.002}
      beta:    {mean:  3.5, sd: 0.5}
      b:       {mean:  0.3, sd: 0.5}         # SC1 mean; sd=0.5 placeholder  TODO:consumer-spec b.sd
      dhr_mean: -2.0                          # inherited from healthy baseline (H2A.1.4); SC1 silent on reward-susceptible  TODO:consumer-spec dhr_mean
      dhr_sd:    0.5                          # inherited from healthy baseline (H2A.1.4); SC1 silent on reward-susceptible  TODO:consumer-spec dhr_sd
      epsilon2_coupling_coef: 0.3             # placeholder  TODO:consumer-spec epsilon2_coupling_coef
    high_anxiety:
      omega_2: {mean: -2.0, sd: 0.5}
      omega_3: {mean: -4.0, sd: 0.5}
      kappa:   {mean:  1.0, sd: 0.25}
      mu3_0:   {mean:  2.0, sd: 0.3}
      theta:   {mean:  0.01, sd: 0.003}
      beta:    {mean:  2.0, sd: 0.5}
      b:       {mean: -0.3, sd: 0.5}         # SC1 mean; sd=0.5 placeholder  TODO:consumer-spec b.sd
      dhr_mean: -0.5                          # SC1 (H2A.1.2): high-anxiety Δhr ~ N(-0.5, 0.8); weak bradycardia (sympathetic overdrive)
      dhr_sd:    0.8                          # SC1 (H2A.1.2)
      epsilon2_coupling_coef: 0.3             # placeholder; coupling direction same as healthy; magnitude TBD  TODO:consumer-spec epsilon2_coupling_coef
    anxious_reward:
      omega_2: {mean: -2.0, sd: 0.5}
      omega_3: {mean: -4.0, sd: 0.5}
      kappa:   {mean:  1.0, sd: 0.25}
      mu3_0:   {mean:  2.0, sd: 0.3}
      theta:   {mean:  0.01, sd: 0.003}
      beta:    {mean:  3.5, sd: 0.5}
      b:       {mean:  0.0, sd: 0.5}         # SC1 mean; sd=0.5 placeholder  TODO:consumer-spec b.sd
      dhr_mean: -0.5                          # inherited from high-anxiety baseline (H2A.1.4); SC1 silent on anxious+reward  TODO:consumer-spec dhr_mean
      dhr_sd:    0.8                          # inherited from high-anxiety baseline (H2A.1.4); SC1 silent on anxious+reward  TODO:consumer-spec dhr_sd
      epsilon2_coupling_coef: 0.3             # placeholder  TODO:consumer-spec epsilon2_coupling_coef

# ---------------------------------------------------------------------------
# Fitting parameters — MCMC settings and prior distributions
# ---------------------------------------------------------------------------
fitting:
  # MCMC defaults for smoke run; production values live in SLURM scripts.
  n_chains: 2
  n_tune: 500
  n_draws: 500
  target_accept: 0.90
  random_seed: 42
  priors:
    omega_2: {mean: -4.0, sd: 2.0}
    omega_3: {mean: -6.0, sd: 2.0}
    kappa:   {lower: 0.0, upper: 2.0, mean: 1.0, sd: 0.5}   # truncated normal
    beta:    {lower: 0.0, upper: 20.0, mean: 4.0, sd: 3.0}  # truncated normal
    mu3_0:   {mean: 1.0, sd: 1.0}
    b:       {mean: 0.0, sd: 1.0}         # response bias (Models A+b, B, C)
    gamma:   {mean: 0.0, sd: 0.5}         # ΔHR additive weight (Models B, C)  TODO:consumer-spec gamma prior
    alpha:   {mean: 0.0, sd: 0.5}         # ΔHR × EV interaction weight (Model C)  TODO:consumer-spec alpha prior
    lam:     {mean: 0.0, sd: 0.1}         # trial-varying omega coupling (Model D)  TODO:consumer-spec lam prior
