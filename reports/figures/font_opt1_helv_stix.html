<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAT-RL HGF Explorer — Font Option 1: Helvetica + STIX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background: #F3F4F6; font-size: 13px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
    background: #D1D5DB; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
  input[type=radio] { cursor: pointer; }
  button { border: none; font-family: inherit; cursor: pointer; }
  button:hover { filter: brightness(0.95); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── Color palette ──────────────────────────────────────────────────────────────
const C = {
  l3:   { fill:"#FAECE7", stroke:"#993C1D", text:"#7a2a10" },  // coral  – volatility
  l2:   { fill:"#E1F5EE", stroke:"#0F6E56", text:"#0a5040" },  // teal   – belief
  l1:   { fill:"#E6F1FB", stroke:"#185FA5", text:"#0d3d7a" },  // blue   – input
  resp: { fill:"#EEEDFE", stroke:"#534AB7", text:"#3a2d90" },  // purple – response
  ev:   { fill:"#F0FAF5", stroke:"#1B7A56", text:"#0a5040" },  // mid-teal – EV
  prm:  { fill:"#FFFBEF", stroke:"#9A7820", text:"#6b5200" },  // gold   – parameters
  dhr:  { fill:"#E8F5E9", stroke:"#388E3C", text:"#1B5E20" },  // green  – ΔHR
  hl:   { fill:"#FFF3CC", stroke:"#CC8800", text:"#7a5000" },  // amber  – highlight
  eVal:"#185FA5", eVol:"#993C1D", eEV:"#1B7A56", eRsp:"#534AB7", ePrm:"#9A7820", eDHR:"#388E3C",
};

// ── Hypotheses ─────────────────────────────────────────────────────────────────
const HYPS = [
  { id:"none", label:"— Explore freely —", color:"#888", dir:null, sub:"",
    desc:"Click any node, edge, or parameter square to learn what it represents. Toggle HGF level and response model to see the architecture change. Sliders scale edge thickness.",
    hlN:[], hlE:[], hlP:[] },
  { id:"omega2_up", label:"H1: Anxiety ↑ω₂", sub:"Over-learning of threat", color:"#0F6E56", dir:"up",
    desc:"Anxious individuals have higher tonic volatility (ω₂ closer to 0), meaning they hold broader priors and update beliefs more quickly after each observation. In a dangerous context this leads to faster threat acquisition; in a safe context, slower extinction. Computational signature: steeper μ₂ trajectories, larger ε₂ prediction errors, more trials to reach asymptote after reversal.",
    hlN:["belief"], hlE:["val"], hlP:["omega2"] },
  { id:"kappa_down", label:"H2: Anxiety ↓κ", sub:"Reduced volatility tracking", color:"#993C1D", dir:"down",
    desc:"A lower κ decouples the level-3 volatility node from the level-2 belief node — the learning rate no longer adapts to current environmental stability. Anxious individuals may remain in a high-alert, fast-updating state even when the task transitions to a stable phase. Computational signature: persistently elevated learning rate; poor discrimination between stable (h=0.03) and volatile (h=0.10) runs.",
    hlN:["vol"], hlE:["kappa_e"], hlP:["kappa"] },
  { id:"b_down", label:"H3: Anxiety ↓b", sub:"Stronger avoidance bias", color:"#534AB7", dir:"down",
    desc:"The intercept b sets the baseline approach tendency independent of EV. A more negative b means the participant avoids even when their HGF tells them the environment is safe and EV(approach) > 0. This captures trait avoidance — a hallmark of anxiety disorders — that goes beyond belief-driven decision-making. Computational signature: proportion of avoids exceeds what EV alone explains; persists across safe contexts.",
    hlN:["resp"], hlE:["ev_resp"], hlP:["b"] },
  { id:"dhr_up", label:"H4: Anxiety ↑ΔHR coupling", sub:"Stronger autonomic→decision link", color:"#388E3C", dir:"up",
    desc:"Anticipatory bradycardia (ΔHR < 0) is an autonomic threat signal. In anxious individuals this bodily signal more strongly drives avoidance: larger |γ| (direct ΔHR→logit) or larger |α| (ΔHR scales EV sensitivity). Computational signature: better model fit for Model C vs. A in anxious group; bradycardia variance predicts avoidance over and above EV.",
    hlN:["dhr","resp"], hlE:["dhr_ev","dhr_resp","ev_resp"], hlP:["gamma","alpha"] },
];

// ── Node / edge info ───────────────────────────────────────────────────────────
const INFO = {
  input:  { title:"u — Binary state observation (node 0 in pyhgf)", body:"Binary-state input node. Value = 1 (dangerous) or 0 (safe) on each trial. This is what you pass to net.input_data(input_data=u[:,None]) — the HGF processes it to update belief μ₂.\n\nIMPORTANT — u vs choices: u drives the HGF belief update. The participant's approach/avoid CHOICES are fitted separately via the response model log-likelihood (model_a/b/c_logp). These are two distinct likelihoods.\n\nMultiple overlapping nodes represent the trial sequence and multi-outcome structure (reward/shock/nothing across runs). Hazard rate: h=0.03 (stable), h=0.10 (volatile)." },
  belief: { title:"μ₂ — Belief about danger (node 1, BELIEF_NODE)", body:"Continuous-state node. Holds posterior belief about the hidden state in log-odds space: μ₂ > 0 → dangerous; μ₂ < 0 → safe. P(dangerous) = σ(μ₂).\n\nUpdate equation: μ₂[k] ~ N(μ₂[k-1], exp(κ·μ₃[k] + ω₂))\n\nPrecision-weighted PE at this level (ε₂) is linked to ventral striatum/amygdala RPE signals. μ₂ is the bridge between HGF belief updating and EV computation in the response model." },
  vol:    { title:"μ₃ — Volatility estimate (node 2, VOLATILITY_NODE)", body:"Continuous-state node. Tracks how fast the hidden state switches. Higher μ₃ → HGF expects more frequent reversals → learning rate of μ₂ increases.\n\nUpdate equation: μ₃[k] ~ N(μ₃[k-1], ϑ)\n\nEffective learning rate of μ₂: exp(κ·μ₃ + ω₂). PE at this level (ε₃) is linked to amygdala/NE uncertainty signals. Only present in 3-level HGF." },
  ev_box: { title:"EV — Expected value of approach (response_patrl.py)", body:"EV = (1 − P_d) · Vᵣ − P_d · Vₛ\n\nwhere P_d = σ(μ₂), Vᵣ = reward magnitude {1,3}, Vₛ = shock magnitude {1,3}.\n\nThis is computed by expected_value(mu2, reward_mag, shock_mag) in response_patrl.py. EV > 0 → approach preferred; EV < 0 → avoid preferred.\n\nNOTE: This is NOT a 'reward model' in the RL sense. The response model directly converts μ₂ (via EV) into decision probabilities. There is no separate reward prediction model." },
  dhr:    { title:"ΔHR — Anticipatory bradycardia (autonomic input)", body:"Trial-level change in heart rate during the 5.5s anticipation window. ΔHR < 0 indicates bradycardia — a pre-emptive bodily threat response.\n\nIn Models B and C this autonomic signal is fed directly into the decision logit (γ·ΔHR) and/or used to scale the EV sensitivity (α·ΔHR). Caller-supplied from fMRI physiological recordings." },
  resp:   { title:"Response model = Decision model (response_patrl.py)", body:"Binary choice: approach (1) or avoid (0). This IS the decision model.\n\nModel A: P(approach) = σ( β · EV + b )\nModel B: P(approach) = σ( β · EV + b + γ · ΔHR )\nModel C: P(approach) = σ( (β + α·ΔHR) · EV + b + γ · ΔHR )\n\nThe response model FITS observed choices (approach/avoid), NOT the HGF input u. Log-likelihood computed by model_a/b/c_logp() in response_patrl.py.\n\nβ = decision precision; b = approach bias; γ = ΔHR→choice; α = ΔHR×EV." },
  omega2: { title:"ω₂ — Tonic volatility (node 1)", body:"Log-scale baseline volatility for the level-2 belief node. Higher (less negative) ω₂ → broader priors → faster belief updating after each observation.\n\nIn pyhgf: node_parameters={'tonic_volatility': omega_2} on node 1.\n\nEffective learning rate ∝ exp(ω₂ + κ·μ₃). Per Klaassen et al. 2024: higher ω₂ is the computational signature of the anxiety direction." },
  omega3: { title:"ω₃ — Meta-volatility (node 2)", body:"Baseline volatility for the level-3 volatility node. Controls how rapidly μ₃ itself can change.\n\n⚠️ Known poor recovery with binary data — interpret group-level ω₃ effects cautiously. Primary hypotheses focus on ω₂ and κ." },
  kappa:  { title:"κ — Volatility coupling (node 2 → node 1)", body:"Scales how strongly the level-3 volatility estimate modulates the level-2 learning rate.\n\nIn pyhgf: volatility_children=([BELIEF_NODE], [kappa])\n\nEffective LR ∝ exp(ω₂ + κ·μ₃). κ=0: 2-level behavior (fixed LR). κ=1 (default): full modulation.\n\nAnxiety hypothesis: ↓κ = reduced adaptive tracking = staying in fixed high-alert mode." },
  mu3_0:  { title:"μ₃⁰ — Initial volatility prior mean (node 2)", body:"Starting value of the volatility estimate before any data. Higher μ₃⁰ → agent begins with high volatility assumption → starts with a fast learning rate." },
  beta:   { title:"β — Inverse temperature (decision precision)", body:"Scales how strongly EV differences translate into choice probability. Higher β → EV more sharply drives approach vs avoid. Lower β → stochastic choices. Typical empirical range: 1–5." },
  b:      { title:"b — Approach bias intercept", body:"Constant offset on the approach logit, independent of EV. b > 0 → baseline tendency to approach. b < 0 → baseline avoidance bias.\n\nAnxiety hypothesis: ↓b (more negative) = habitual avoidance that persists even when the environment is objectively safe." },
  gamma:  { title:"γ — Direct ΔHR → logit coupling (Models B, C)", body:"Adds the autonomic signal directly to the approach logit: +γ·ΔHR. Since anticipatory bradycardia is negative (ΔHR < 0), γ < 0 means bradycardia increases avoidance. Anxiety hypothesis: larger |γ| = stronger bodily threat signal driving behavior." },
  alpha:  { title:"α — ΔHR × EV interaction scaling (Model C only)", body:"Scales how much ΔHR modulates EV sensitivity: effective β becomes (β + α·ΔHR). When ΔHR < 0 and α < 0, EV sensitivity decreases — the agent is less responsive to whether approach is actually good or bad. Anxiety hypothesis: larger |α| = autonomic signal overrides rational EV computation." },
  vrew:   { title:"Vᵣ — Reward magnitude", body:"Trial-level reward magnitude for approach. Two levels: low (1) and high (3). Drawn uniformly from the 2×2 magnitude grid. Higher Vᵣ → higher EV when environment is safe → stronger pull toward approach." },
  vshk:   { title:"Vₛ — Shock magnitude", body:"Trial-level shock magnitude for approach. Two levels: low (1) and high (3). Higher Vₛ → more negative EV when environment is dangerous → stronger pull toward avoidance." },
  val:    { title:"Value coupling: μ₂ ↔ u (pyhgf value_children)", body:"Downward: belief μ₂ generates prediction for binary input u. Upward: precision-weighted PE ε₂ propagates from u back to μ₂. This is the core Bayesian updating step.\n\nSolid blue arrow = value coupling. Thickness scales with ω₂. In pyhgf: value_children=INPUT_NODE on node 1." },
  kappa_e:{ title:"Volatility coupling: μ₃ → μ₂ (pyhgf volatility_children)", body:"The level-3 node modulates the effective precision (learning rate) of the level-2 belief node. Coupling strength κ. Dashed coral = volatility coupling. Thickness scales with κ.\n\nOnly present in 3-level model. In pyhgf: volatility_children=([BELIEF_NODE], [kappa]) on node 2." },
  ev_resp:{ title:"EV → response model (belief-to-decision pathway)", body:"The computed expected value of approach feeds directly into the decision logit. This is the core pathway from HGF beliefs (μ₂) through EV to the action (approach/avoid).\n\nThickness scales with β (how strongly EV differences drive choices)." },
  dhr_ev: { title:"ΔHR → EV scaling (Model C: α·ΔHR·EV term)", body:"Autonomic signal modulates how strongly EV influences the decision. In anxious individuals, bradycardia may suppress EV sensitivity — the 'rational' EV calculation is overridden by the bodily threat signal." },
  dhr_resp:{ title:"ΔHR → logit (Models B, C: γ·ΔHR term)", body:"Direct effect of anticipatory bradycardia on the approach logit. Since ΔHR < 0 in threatening contexts, γ < 0 means bradycardia increases avoidance probability beyond what EV alone would predict." },
};

// ── SVG geometry ───────────────────────────────────────────────────────────────
const hexPts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(Math.PI/3)*i-Math.PI/6;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(" ");
const diamPts=(cx,cy,rx,ry)=>`${cx},${cy-ry} ${cx+rx},${cy} ${cx},${cy+ry} ${cx-rx},${cy}`;
const retract=(x1,y1,x2,y2,d)=>{const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);return len<1?[x2,y2]:[x2-(dx/len)*d,y2-(dy/len)*d];};

// ── Main component ─────────────────────────────────────────────────────────────
function App() {
  const [hgfLevel, setHgfLevel] = useState("3level");
  const [respModel, setRespModel] = useState("C");
  const [omega2, setOmega2] = useState(-3.0);
  const [omega3, setOmega3] = useState(-4.0);
  const [kappa,  setKappa]  = useState(1.0);
  const [mu3_0,  setMu3_0]  = useState(1.0);
  const [beta,   setBeta]   = useState(2.0);
  const [b,      setB]      = useState(0.0);
  const [gamma,  setGamma]  = useState(-0.3);
  const [alpha,  setAlpha]  = useState(-0.1);
  const [hypId,  setHypId]  = useState("none");
  const [sel,    setSel]    = useState(null);

  const hyp = HYPS.find(h => h.id === hypId);
  const is3  = hgfLevel === "3level";
  const hasDHR   = respModel === "B" || respModel === "C";
  const hasAlpha = respModel === "C";

  const hlN = id => hyp.hlN.includes(id);
  const hlE = id => hyp.hlE.includes(id);
  const hlP = id => hyp.hlP.includes(id);

  // Edge widths from sliders
  const wVal  = 1.2 + Math.max(0, omega2+8)*0.38;
  const wVol  = 0.7 + kappa*2.6;
  const wEV   = 0.8 + beta*0.55;
  const wDHR  = 1.0 + Math.abs(gamma)*2.8 + Math.abs(alpha)*2.0;

  // Layout — diagram area (SW_D) + equations panel (SW_EQ)
  const CX=350, SW_D=700, SW_EQ=310, SW=SW_D+SW_EQ;
  const GX=175, PX=90;   // ghost k-1 node x-centre; param-square x-centre (left column)
  const EQX = SW_D + 22;  // x start of equations text
  const rowV = 85;
  const rowB = is3 ? 245 : 165;
  const rowI = is3 ? 390 : 305;
  const evY  = rowI + 92;
  const respY = evY + 104;
  const SH   = respY + 104;

  const click = (id,e) => { e&&e.stopPropagation(); setSel(p=>p===id?null:id); };
  const nC = (id,base) => hlN(id) ? C.hl : (sel===id ? {...base,stroke:"#2563EB"} : base);
  const eC = (id,def)  => hlE(id) ? "#CC7700" : def;
  const pC = id        => hlP(id) ? C.hl : C.prm;

  const displayInfo = useMemo(()=>{
    if (sel && INFO[sel]) return INFO[sel];
    if (hypId !== "none") return { title:`${hyp.label}${hyp.sub?" — "+hyp.sub:""}`, body:hyp.desc };
    return { title:"PAT-RL Hierarchical Gaussian Filter", body:"Safe/dangerous binary state · approach/avoid decision · 2×2 reward×shock magnitudes · ΔHR autonomic covariate. Select a hypothesis to highlight the relevant pathway. Click any element to inspect it." };
  }, [sel, hypId]);

  const DirBadge = ({x,y}) => hyp.dir
    ? <text x={x} y={y} textAnchor="middle" fontSize={17} fontWeight={800} fill="#CC8800">{hyp.dir==="up"?"↑":"↓"}</text>
    : null;

  const PSq = ({x,y,pid,label,disabled}) => {
    const cc = disabled ? {fill:"#F9FAFB",stroke:"#D1D5DB",text:"#9CA3AF"} : pC(pid);
    return(<g onClick={disabled?undefined:e=>click(pid,e)} style={{cursor:disabled?"default":"pointer",opacity:disabled?0.45:1}}>
      {sel===pid&&!disabled&&<rect x={x-18} y={y-18} width={36} height={36} rx={6} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.6}/>}
      <rect x={x-13} y={y-13} width={26} height={26} rx={3} fill={cc.fill} stroke={cc.stroke} strokeWidth={sel===pid?2.2:1.5}/>
      <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={12} fontWeight={700} fill={cc.text}>{label}</text>
      {!disabled&&hlP(pid)&&<DirBadge x={x+18} y={y-12}/>}
    </g>);
  };

  const AM = ({id,color}) => (<marker id={id} markerWidth={8} markerHeight={6} refX={7} refY={3} orient="auto"><polygon points="0,0 8,3 0,6" fill={color}/></marker>);

  const formula = respModel==="A"
    ? "P(approach) = σ( β · EV  +  b )"
    : respModel==="B"
    ? "P(approach) = σ( β · EV  +  b  +  γ · ΔHR )"
    : "P(approach) = σ( (β + α·ΔHR) · EV  +  b  +  γ · ΔHR )";

  // ── Equations panel helpers ──────────────────────────────────────────────────
  // EqLine: renders a single styled line in the equations panel
  // isMath=true → Georgia serif, slightly larger; isNote → small gray
  const EqLine = ({x,y,text,isMath,isNote,color}) => (
    <text x={x} y={y}
      fontFamily={isMath ? "Georgia,serif" : "inherit"}
      fontSize={isMath ? 11 : isNote ? 9 : 10}
      fontWeight={isMath ? 600 : 400}
      fill={color || (isMath ? "#111827" : isNote ? "#9CA3AF" : "#4B5563")}>
      {text}
    </text>
  );

  const EqHeader = ({x,y,text,color}) => (
    <text x={x} y={y} fontSize={9} fontWeight={800} letterSpacing={0.8} fill={color||"#374151"}>
      {text}
    </text>
  );

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:'"Helvetica Neue",Helvetica,Arial,sans-serif',fontSize:13,background:"#F3F4F6",overflow:"hidden"}} onClick={()=>setSel(null)}>

      {/* ── Sidebar ─────────────────────────────────────────────────────────── */}
      <div style={{width:278,background:"#fff",borderRight:"1px solid #E5E7EB",padding:"18px 16px",overflowY:"auto",flexShrink:0}} onClick={e=>e.stopPropagation()}>

        <div style={{fontWeight:800,fontSize:14,color:"#111827",marginBottom:1}}>PAT-RL HGF Explorer</div>
        <div style={{fontSize:10,color:"#9CA3AF",marginBottom:4}}>Predator Avoidance Task · approach/avoid</div>
        <div style={{fontSize:10,color:"#9CA3AF",marginBottom:18}}>binary state · 2×2 magnitudes · ΔHR covariate</div>

        <Blk title="HGF LEVEL">
          {[{id:"2level",label:"2-level",note:"ω₂ only · fixed learning rate"},
            {id:"3level",label:"3-level",note:"ω₂ + ω₃ + κ · adaptive learning rate"}].map(m=>(
            <label key={m.id} style={{display:"flex",gap:8,marginBottom:8,cursor:"pointer"}}>
              <input type="radio" checked={hgfLevel===m.id} onChange={()=>{setHgfLevel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:hgfLevel===m.id?700:400,color:hgfLevel===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="RESPONSE MODEL">
          {[{id:"A",label:"Model A",note:"β·EV + b  (beliefs only)"},
            {id:"B",label:"Model B",note:"+ γ·ΔHR  (direct autonomic)"},
            {id:"C",label:"Model C",note:"+ α·ΔHR·EV  (EV scaling)"},
          ].map(m=>(
            <label key={m.id} style={{display:"flex",gap:8,marginBottom:7,cursor:"pointer"}}>
              <input type="radio" checked={respModel===m.id} onChange={()=>{setRespModel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:respModel===m.id?700:400,color:respModel===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="PARAMETERS  ↔  EDGE THICKNESS">
          <Sldr label="ω₂" hint="tonic volatility"   val={omega2} min={-8}   max={0}   step={0.1}  hl={hlP("omega2")} fmt={v=>v.toFixed(1)}  onChange={setOmega2}/>
          {is3&&<>
            <Sldr label="ω₃" hint="meta-volatility"  val={omega3} min={-8}   max={0}   step={0.1}  hl={hlP("omega3")} fmt={v=>v.toFixed(1)}  onChange={setOmega3}/>
            <Sldr label="κ"  hint="vol. coupling"    val={kappa}  min={0}    max={2.5} step={0.05} hl={hlP("kappa")}  fmt={v=>v.toFixed(2)} onChange={setKappa}/>
          </>}
          <Sldr label="β"  hint="decision precision" val={beta}   min={0.2}  max={6}   step={0.1}  hl={hlP("beta")}   fmt={v=>v.toFixed(1)}  onChange={setBeta}/>
          <Sldr label="b"  hint="approach bias"      val={b}      min={-3}   max={3}   step={0.05} hl={hlP("b")}      fmt={v=>v.toFixed(2)} onChange={setB}/>
          {hasDHR&&<Sldr label="γ"  hint="ΔHR direct" val={gamma}  min={-1.5} max={0.5} step={0.05} hl={hlP("gamma")}  fmt={v=>v.toFixed(2)} onChange={setGamma}/>}
          {hasAlpha&&<Sldr label="α" hint="ΔHR×EV"    val={alpha}  min={-0.5} max={0.5} step={0.02} hl={hlP("alpha")}  fmt={v=>v.toFixed(2)} onChange={setAlpha}/>}
        </Blk>

        <Blk title="ANXIETY HYPOTHESES">
          {HYPS.filter(h=>is3||h.id!=="kappa_down").map(h=>(
            <button key={h.id} onClick={()=>{setHypId(h.id);setSel(null);}} style={{
              display:"block",width:"100%",textAlign:"left",padding:"7px 10px",marginBottom:4,
              borderRadius:6,border:`1.5px solid ${hypId===h.id?h.color:"#E5E7EB"}`,
              background:hypId===h.id?h.color+"14":"#FAFAFA",
              color:hypId===h.id?h.color:"#374151",fontWeight:hypId===h.id?700:400,fontSize:12,
            }}>
              <div>{h.label}</div>
              {h.sub&&<div style={{fontSize:10,opacity:0.72,marginTop:1}}>{h.sub}</div>}
            </button>
          ))}
        </Blk>

        <Blk title="NOTATION">
          {[{sh:"hex",c:C.l3,t:"Hidden state node (volatility)"},
            {sh:"cir",c:C.l2,t:"Belief node μ₂ (continuous)"},
            {sh:"dia",c:C.l1,t:"Observation u (binary state)"},
            {sh:"sq", c:C.prm,t:"Fixed parameter"},
            {sh:"dia",c:C.dhr,t:"ΔHR / magnitude input"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={18} height={18} viewBox="0 0 18 18">
                {it.sh==="hex"&&<polygon points={hexPts(9,9,7)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="cir"&&<circle cx={9} cy={9} r={7} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="dia"&&<polygon points={diamPts(9,9,7,6)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="sq" &&<rect x={2} y={2} width={14} height={14} rx={2} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
              </svg>

                  <text x={(dhx-20+ex)/2+8} y={(dhy+ey)/2-6} fontSize={9} fill={C.eDHR} fontFamily="STIX Two Text,Georgia,serif" fontWeight={hlEV?800:600}>α</text>
                </g>}
                <g onClick={e=>click("dhr",e)} style={{cursor:"pointer"}}>
                  {(hlDHR||sel==="dhr")&&<polygon points={diamPts(dhx,dhy,32,26)} fill="none" stroke={hlDHR?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlDHR?"none":"4,2"} opacity={0.55}/>}
                  <polygon points={diamPts(dhx,dhy,24,19)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={dhx} y={dhy+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={10} fontWeight={700} fill={nc.text}>ΔHR</text>
                  {hlDHR&&<DirBadge x={dhx+34} y={dhy-18}/>}
                </g>
                <text x={dhx} y={dhy+32} textAnchor="middle" fontSize={9} fill="#9CA3AF">bradycardia</text>
              </>);
            })()}

            {/* ── Response separator + model box ───────────────────────── */}
            <line x1={28} y1={respY-55} x2={SW_D-28} y2={respY-55} stroke="#D1D5DB" strokeWidth={1.5} strokeDasharray="9,5"/>
            <text x={SW_D/2} y={respY-42} textAnchor="middle" fontSize={9} fill="#9CA3AF" fontWeight={600} letterSpacing={1.5}>RESPONSE / DECISION MODEL</text>

            {/* ── Response params — left column (same column as HGF params) ── */}
            {(()=>{
              const ry=respY, bx=110;
              const respPs=[
                {pid:"beta",  label:"β", val:beta.toFixed(1)},
                {pid:"b",     label:"b", val:b.toFixed(2)},
                ...(hasDHR   ? [{pid:"gamma",label:"γ",val:gamma.toFixed(2)}] : []),
                ...(hasAlpha ? [{pid:"alpha",label:"α",val:alpha.toFixed(2)}] : []),
              ];
              return(<>{respPs.map((p,i)=>{
                const py=ry-12+i*26;
                return(<g key={p.pid} onClick={e=>click(p.pid,e)} style={{cursor:"pointer"}}>
                  <line x1={PX+13} y1={py} x2={bx} y2={py}
                    stroke={C.ePrm} strokeWidth={1.0} strokeDasharray="3,2" opacity={0.48}/>
                  <PSq x={PX} y={py} pid={p.pid} label={p.label}/>
                  <text x={PX} y={py+20} textAnchor="middle" fontSize={8}
                    fill={pC(p.pid).text} opacity={0.8}>{p.val}</text>
                  {hlP(p.pid)&&<DirBadge x={PX-18} y={py-14}/>}
                </g>);
              })}</>);
            })()}

            {/* ── Response box (original shape) ───────────────────────── */}
            {(()=>{
              const ry=respY, nc=nC("resp",C.resp), bx=110, bw=SW_D-110-25;
              return(<g onClick={e=>click("resp",e)} style={{cursor:"pointer"}}>
                {(hlN("resp")||sel==="resp")&&<rect x={bx-7} y={ry-36} width={bw+14} height={76} rx={13}
                  fill="none" stroke={hlN("resp")?"#CC7700":"#2563EB"} strokeWidth={2}
                  strokeDasharray={hlN("resp")?"none":"5,3"} opacity={0.55}/>}
                <rect x={bx} y={ry-30} width={bw} height={66} rx={10}
                  fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                <text x={bx+bw/2} y={ry-9} textAnchor="middle" fontFamily="STIX Two Text,Georgia,serif"
                  fontSize={11} fontWeight={700} fill={nc.text}>{formula}</text>
                <text x={bx+bw/2} y={ry+8} textAnchor="middle" fontSize={10}
                  fill={nc.text} opacity={0.65}>approach (1) / avoid (0)</text>
                {hlN("resp")&&<DirBadge x={bx+bw+18} y={ry-10}/>}
              </g>);
            })()}

          </svg>
        </div>

        {/* Info panel */}
        <div style={{background:"#fff",borderRadius:10,padding:"13px 17px",
          border:`1.5px solid ${sel?"#E5E7EB":hypId!=="none"?hyp.color:"#E5E7EB"}`,
          boxShadow:"0 1px 4px rgba(0,0,0,0.05)",flex:"0 0 auto"}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:5,color:sel?"#111827":hypId!=="none"?hyp.color:"#374151"}}>
            {displayInfo.title}
          </div>
          <div style={{fontSize:12,color:"#4B5563",lineHeight:1.68,whiteSpace:"pre-line"}}>
            {displayInfo.body}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Helper components ──────────────────────────────────────────────────────────
function Blk({title,children}){
  return<div style={{marginBottom:18}}>
    <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,color:"#9CA3AF",textTransform:"uppercase",marginBottom:8}}>{title}</div>
    {children}
  </div>;
}
function Sldr({label,hint,val,min,max,step,hl,fmt,onChange}){
  return<div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{fontFamily:'"STIX Two Text",Georgia,serif',fontWeight:700,fontSize:14,color:hl?"#CC7700":"#1F2937"}}>{label}</span>
        <span style={{fontSize:10,color:"#9CA3AF"}}>{hint}</span>
      </div>
      <span style={{fontSize:12,fontWeight:hl?700:500,color:hl?"#CC7700":"#374151"}}>{fmt(val)}</span>
    </div>
    <input type="range" min={min} max={max} step={step} value={val}
      onChange={e=>onChange(parseFloat(e.target.value))}
      style={{width:"100%",accentColor:hl?"#CC7700":"#185FA5"}}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
