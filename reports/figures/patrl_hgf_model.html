<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAT-RL HGF Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=STIX+Two+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif; background: #F3F4F6; font-size: 20px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
    background: #D1D5DB; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
  input[type=radio] { cursor: pointer; }
  button { border: none; font-family: inherit; cursor: pointer; }
  button:hover { filter: brightness(0.95); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Color palette ──────────────────────────────────────────────────────────────
const C = {
  l3:   { fill:"#FAECE7", stroke:"#993C1D", text:"#7a2a10" },  // coral  – volatility
  l2:   { fill:"#E1F5EE", stroke:"#0F6E56", text:"#0a5040" },  // teal   – belief
  l1:   { fill:"#E6F1FB", stroke:"#185FA5", text:"#0d3d7a" },  // blue   – input
  resp: { fill:"#EEEDFE", stroke:"#534AB7", text:"#3a2d90" },  // purple – response
  ev:   { fill:"#F0FAF5", stroke:"#1B7A56", text:"#0a5040" },  // mid-teal – EV
  prm:  { fill:"#FFFBEF", stroke:"#9A7820", text:"#6b5200" },  // gold   – parameters
  dhr:  { fill:"#E8F5E9", stroke:"#388E3C", text:"#1B5E20" },  // green  – ΔHR
  hl:   { fill:"#FFF3CC", stroke:"#CC8800", text:"#7a5000" },  // amber  – highlight
  eVal:"#185FA5", eVol:"#993C1D", eEV:"#1B7A56", eRsp:"#534AB7", ePrm:"#9A7820", eDHR:"#388E3C",
};

// Phenotype colors
const PC = {
  balanced:             '#1D9E75',
  reward_blunted:       '#378ADD',
  threat_hypervigilant: '#993C1D',
  both_disrupted:       '#534AB7',
};

// ── ANS Phenotypes (replaces anxiety hypotheses) ────────────────────────────────
const PHENOS = [
  {
    id:"balanced",
    label:"① Balanced",
    color: PC.balanced,
    ans:"Healthy SNS / PNS reciprocity",
    params:"γ < 0  ·  ω₂ low  ·  b ≈ 0",
    hlN:[], hlE:["dhr_resp"], hlP:["gamma"],
  },
  {
    id:"reward_blunted",
    label:"② Reward blunted",
    color: PC.reward_blunted,
    ans:"Blunted parasympathetic reward drive",
    params:"β ↓  ·  ω₂ normal  ·  b ≈ 0",
    hlN:["resp"], hlE:["ev_resp"], hlP:["beta","b"],
  },
  {
    id:"threat_hypervigilant",
    label:"③ Threat hypervigilant",
    color: PC.threat_hypervigilant,
    ans:"Sympathetic hyperactivation",
    params:"ω₂ ↑  ·  μ₃⁰ ↑  ·  b ↓  ·  |γ| ↑",
    hlN:["belief","vol"], hlE:["val","dhr_resp"], hlP:["omega2","mu3_0","b","gamma"],
  },
  {
    id:"both_disrupted",
    label:"④ Both disrupted",
    color: PC.both_disrupted,
    ans:"SNS dominant + PNS blunted",
    params:"β ↓  ·  ω₂ ↑  ·  μ₃⁰ ↑  ·  b ↓↓",
    hlN:["belief","vol","resp"], hlE:["val","ev_resp"], hlP:["omega2","mu3_0","beta","b"],
  },
];

// ── Node / edge info ───────────────────────────────────────────────────────────
const INFO = {
  input:  { title:"u — Binary state observation (node 0 in pyhgf)", body:"Binary-state input node. Value = 1 (dangerous) or 0 (safe) on each trial. This is what you pass to net.input_data(input_data=u[:,None]) — the HGF processes it to update belief μ₂.\n\nIMPORTANT — u vs choices: u drives the HGF belief update. The participant's approach/avoid CHOICES are fitted separately via the response model log-likelihood (model_a/b/c_logp). These are two distinct likelihoods.\n\nMultiple overlapping nodes represent the trial sequence across 5 phases (380 trials). Hazard rate: h=0.03 (stable), h=0.10 (volatile)." },
  belief: { title:"μ₂ — Belief about danger (node 1, BELIEF_NODE)", body:"Continuous-state node. Holds posterior belief about the hidden state in log-odds space: μ₂ > 0 → dangerous; μ₂ < 0 → safe. P(dangerous) = σ(μ₂).\n\nUpdate equation: μ₂[k] ~ N(μ₂[k-1], exp(κ·μ₃[k] + ω₂))\n\nSNS/PNS link: a high-ω₂ (SNS-dominant) agent has broader update steps — the belief node swings more per trial. μ₂ is the bridge between HGF belief updating and EV computation in the response model." },
  vol:    { title:"μ₃ — Volatility estimate (node 2, VOLATILITY_NODE)", body:"Continuous-state node. Tracks how fast the hidden state switches. Higher μ₃ → HGF expects more frequent reversals → learning rate of μ₂ increases.\n\nUpdate equation: μ₃[k] ~ N(μ₃[k-1], ϑ)\n\nSNS/PNS link: SNS-dominant phenotypes (③ ④) maintain elevated μ₃ even in stable phases — each oddball renews sympathetic arousal rather than being filtered. This is the v/n misattribution signature. Only present in 3-level HGF." },
  ev_box: { title:"EV — Expected value of approach (response_patrl.py)", body:"EV = (1 − P_d) · Vᵣ − P_d · Vₛ\n\nwhere P_d = σ(μ₂), Vᵣ = reward magnitude {1,3}, Vₛ = shock magnitude {1,3}.\n\nThis is computed by expected_value(mu2, reward_mag, shock_mag) in response_patrl.py. EV > 0 → approach preferred; EV < 0 → avoid preferred." },
  dhr:    { title:"ΔHR — Anticipatory bradycardia (autonomic input)", body:"Trial-level change in heart rate during the anticipation window. ΔHR < 0 = bradycardia — a parasympathetic (vagal) pre-response.\n\nIn Models B and C this PNS signal feeds into the decision logit (γ·ΔHR) and/or scales EV sensitivity (α·ΔHR). In Model D it directly modulates the learning rate via ω_eff(t) = ω + λ·ΔHR.\n\nHealthy phenotype (①): λ < 0 — vagal engagement tightens the precision window, smaller μ₂ update on bradycardia trials. Dysregulated (③): λ ≈ 0 — autonomic state does not reconfigure learning." },
  resp:   { title:"Response model = Decision model (response_patrl.py)", body:"Binary choice: approach (1) or avoid (0). This IS the decision model.\n\nModel A: P(approach) = σ( β · EV + b )\nModel B: P(approach) = σ( β · EV + b + γ · ΔHR )\nModel C: P(approach) = σ( (β + α·ΔHR) · EV + b + γ · ΔHR )\n\nSNS/PNS framing:\n• β ↓ = blunted PNS reward drive (phenotype ②)\n• b ↓ = SNS-driven habitual avoidance (phenotype ③ ④)\n• γ < 0 = vagal→avoidance coupling; healthy if modest, disrupted if absent\n• α < 0 = PNS attenuates threat sensitivity in real-time (broken in ③)" },
  omega2: { title:"ω₂ — Tonic volatility (log-scale, node 1)", body:"Log-scale baseline volatility for the level-2 belief node. Higher (less negative) ω₂ → broader priors → faster belief updating after each observation.\n\nIn pyhgf: node_parameters={'tonic_volatility': omega_2} on node 1.\n\nEffective learning rate ∝ exp(ω₂ + κ·μ₃).\n\nSNS link: ω₂ ↑ is the computational signature of chronic SNS hyperactivation — the nervous system maintains a high-uncertainty, high-reactivity state." },
  omega3: { title:"ω₃ — Meta-volatility (node 2)", body:"Baseline volatility for the level-3 volatility node. Controls how rapidly μ₃ itself can change.\n\n⚠️ Known poor recovery with binary data — interpret group-level ω₃ effects cautiously. Primary hypotheses focus on ω₂ and κ." },
  kappa:  { title:"κ — Volatility coupling (node 2 → node 1)", body:"Scales how strongly the level-3 volatility estimate modulates the level-2 learning rate.\n\nIn pyhgf: volatility_children=([BELIEF_NODE], [kappa])\n\nEffective LR ∝ exp(ω₂ + κ·μ₃). κ=0: 2-level behavior (fixed LR). κ=1 (default): full modulation.\n\nSNS link: ↓κ = reduced adaptive tracking = staying in fixed high-alert mode regardless of true environmental stability." },
  mu3_0:  { title:"μ₃⁰ — Initial volatility prior mean (node 2)", body:"Starting value of the volatility estimate before any data. Higher μ₃⁰ → agent begins with high volatility assumption → starts with a fast learning rate.\n\nSNS phenotypes (③ ④) use μ₃⁰ ↑ — they enter each session already primed with elevated uncertainty." },
  beta:   { title:"β — Inverse temperature (decision precision)", body:"Scales how strongly EV differences translate into choice probability. Higher β → EV more sharply drives approach vs avoid. Lower β → stochastic choices.\n\nPNS link: β ↓ is the computational signature of blunted parasympathetic reward engagement (phenotype ②) — the agent knows the environment is safe but does not act on it." },
  b:      { title:"b — Approach bias intercept", body:"Constant offset on the approach logit, independent of EV. b > 0 → baseline tendency to approach. b < 0 → baseline avoidance bias.\n\nSNS link: b ↓ (more negative) = habitual SNS-driven avoidance that persists even when the environment is objectively safe and EV(approach) > 0." },
  gamma:  { title:"γ — Direct ΔHR → logit coupling (Models B, C)", body:"Adds the autonomic signal directly to the approach logit: +γ·ΔHR. Since anticipatory bradycardia is negative (ΔHR < 0), γ < 0 means bradycardia increases avoidance.\n\nPNS link: healthy phenotype (①) has modest γ < 0 — vagal signal appropriately shapes the decision. Disrupted phenotypes (③ ④) may show γ ≈ 0 — the PNS signal is present (bradycardia occurs) but does not reconfigure the decision, consistent with broken cardiac→cortical feedback." },
  alpha:  { title:"α — ΔHR × EV interaction scaling (Model C only)", body:"Scales how much ΔHR modulates EV sensitivity: effective β becomes (β + α·ΔHR). When ΔHR < 0 and α < 0, EV sensitivity decreases — the agent is less responsive to whether approach is actually good or bad.\n\nPNS link: healthy phenotype has α_shk < 0 — bradycardia attenuates threat sensitivity in real-time. SNS-dominant phenotype (③): α_shk ≈ 0 — the PNS signal exists but does not reconfigure the threat response." },
  vrew:   { title:"Vᵣ — Reward magnitude", body:"Trial-level reward magnitude for approach. Two levels: low (1) and high (3). Drawn uniformly from the 2×2 magnitude grid. Higher Vᵣ → higher EV when environment is safe → stronger pull toward approach." },
  vshk:   { title:"Vₛ — Shock magnitude", body:"Trial-level shock magnitude for approach. Two levels: low (1) and high (3). Higher Vₛ → more negative EV when environment is dangerous → stronger pull toward avoidance." },
  val:    { title:"Value coupling: μ₂ ↔ u (pyhgf value_children)", body:"Downward: belief μ₂ generates prediction for binary input u. Upward: precision-weighted PE ε₂ propagates from u back to μ₂. This is the core Bayesian updating step.\n\nSolid blue arrow = value coupling. Thickness scales with ω₂. In pyhgf: value_children=INPUT_NODE on node 1." },
  kappa_e:{ title:"Volatility coupling: μ₃ → μ₂ (pyhgf volatility_children)", body:"The level-3 node modulates the effective precision (learning rate) of the level-2 belief node. Coupling strength κ. Dashed coral = volatility coupling. Thickness scales with κ.\n\nOnly present in 3-level model. In pyhgf: volatility_children=([BELIEF_NODE], [kappa]) on node 2." },
  ev_resp:{ title:"EV → response model (belief-to-decision pathway)", body:"The computed expected value of approach feeds directly into the decision logit. This is the core pathway from HGF beliefs (μ₂) through EV to the action (approach/avoid).\n\nThickness scales with β (how strongly EV differences drive choices). PNS link: blunted β (phenotype ②) means this pathway is attenuated — beliefs and EV do not translate into approach." },
  dhr_ev: { title:"ΔHR → EV scaling (Model C: α·ΔHR·EV term)", body:"Autonomic (PNS) signal modulates how strongly EV influences the decision. In healthy agents, bradycardia may attenuate threat sensitivity (α_shk < 0) — the PNS reconfigures the value computation in real time." },
  dhr_resp:{ title:"ΔHR → logit (Models B, C: γ·ΔHR term)", body:"Direct effect of anticipatory bradycardia on the approach logit. Healthy phenotype (①): modest γ < 0 — vagal signal appropriately signals caution. SNS-dominant (③ ④): disrupted or absent γ — the PNS signal occurs but is not heard by the decision system." },
};

// ── SVG geometry ───────────────────────────────────────────────────────────────
const hexPts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(Math.PI/3)*i-Math.PI/6;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(" ");
const diamPts=(cx,cy,rx,ry)=>`${cx},${cy-ry} ${cx+rx},${cy} ${cx},${cy+ry} ${cx-rx},${cy}`;
const retract=(x1,y1,x2,y2,d)=>{const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);return len<1?[x2,y2]:[x2-(dx/len)*d,y2-(dy/len)*d];};

// ── Main component ─────────────────────────────────────────────────────────────
function App() {
  const [hgfLevel, setHgfLevel] = useState("3level");
  const [respModel, setRespModel] = useState("C");
  const omega2 = -3.0, omega3 = -4.0, kappa = 1.0, mu3_0 = 1.0;
  const beta = 2.0, b = 0.0, gamma = -0.3, alpha = -0.1;
  const [phenoId, setPhenoId] = useState("balanced");
  const [sel,    setSel]    = useState(null);

  const pheno = PHENOS.find(p => p.id === phenoId);
  const is3  = hgfLevel === "3level";
  const isMM = hgfLevel === "2level_mm";
  const hasDHR   = respModel === "B" || respModel === "C";
  const hasAlpha = respModel === "C";

  const hlN = id => pheno.hlN.includes(id);
  const hlE = id => pheno.hlE.includes(id);
  const hlP = id => pheno.hlP.includes(id);

  // Edge widths from sliders
  const wVal  = 1.2 + Math.max(0, omega2+8)*0.38;
  const wVol  = 0.7 + kappa*2.6;
  const wEV   = 0.8 + beta*0.55;
  const wDHR  = 1.0 + Math.abs(gamma)*2.8 + Math.abs(alpha)*2.0;

  // Layout
  const CX=350, SW_D=700, SW_EQ=310, SW=SW_D+SW_EQ;
  const GX=175, PX=90;
  const EQX = SW_D + 22;
  const rowV = 85;
  const rowB = is3 ? 245 : 165;
  const rowI = is3 ? 390 : 305;
  const evY  = rowI + 92;
  const respY = evY + 104;
  const SH   = respY + 104;

  const click = (id,e) => { e&&e.stopPropagation(); setSel(p=>p===id?null:id); };
  const nC = (id,base) => hlN(id) ? C.hl : (sel===id ? {...base,stroke:"#2563EB"} : base);
  const eC = (id,def)  => hlE(id) ? "#CC7700" : def;
  const pC = id        => hlP(id) ? C.hl : C.prm;

  const displayInfo = (sel && INFO[sel]) ? INFO[sel] : null;

  const PSq = ({x,y,pid,label,disabled}) => {
    const cc = disabled ? {fill:"#F9FAFB",stroke:"#D1D5DB",text:"#9CA3AF"} : pC(pid);
    return(<g onClick={disabled?undefined:e=>click(pid,e)} style={{cursor:disabled?"default":"pointer",opacity:disabled?0.45:1}}>
      {sel===pid&&!disabled&&<rect x={x-18} y={y-18} width={36} height={36} rx={6} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.6}/>}
      <rect x={x-13} y={y-13} width={26} height={26} rx={3} fill={cc.fill} stroke={cc.stroke} strokeWidth={sel===pid?2.2:1.5}/>
      <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={18} fontWeight={700} fill={cc.text}>{label}</text>
    </g>);
  };

  const AM = ({id,color}) => (<marker id={id} markerWidth={8} markerHeight={6} refX={7} refY={3} orient="auto"><polygon points="0,0 8,3 0,6" fill={color}/></marker>);

  const formula = respModel==="A"
    ? "P(approach) = σ( β · EV  +  b )"
    : respModel==="B"
    ? "P(approach) = σ( β · EV  +  b  +  γ · ΔHR )"
    : "P(approach) = σ( (β + α·ΔHR) · EV  +  b  +  γ · ΔHR )";

  const EqLine = ({x,y,text,isMath,isNote,color}) => (
    <text x={x} y={y}
      fontFamily={isMath ? "STIX Two Text,Georgia,serif" : "inherit"}
      fontSize={isMath ? 17 : isNote ? 14 : 15}
      fontWeight={isMath ? 600 : 400}
      fill={color || (isMath ? "#111827" : isNote ? "#9CA3AF" : "#4B5563")}>
      {text}
    </text>
  );

  const EqHeader = ({x,y,text,color}) => (
    <text x={x} y={y} fontSize={14} fontWeight={800} letterSpacing={0.8} fill={color||"#374151"}>
      {text}
    </text>
  );

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Source Sans 3','Source Sans Pro',sans-serif",fontSize:20,background:"#F3F4F6",overflow:"hidden"}} onClick={()=>setSel(null)}>

      {/* ── Sidebar ─────────────────────────────────────────────────────────── */}
      <div style={{width:278,background:"#fff",borderRight:"1px solid #E5E7EB",padding:"18px 16px",overflowY:"auto",flexShrink:0}} onClick={e=>e.stopPropagation()}>


        <Blk title="HGF LEVEL">
          {[{id:"2level",label:"2-level",note:"ω₂ only · fixed learning rate"},
            {id:"3level",label:"3-level",note:"ω₂ + ω₃ + κ · adaptive learning rate"},
            {id:"2level_mm",label:"2-level multimodal",note:"ω₂ only · two observation channels"}].map(m=>(
            <label key={m.id} style={{display:"flex",gap:8,marginBottom:8,cursor:"pointer"}}>
              <input type="radio" checked={hgfLevel===m.id} onChange={()=>{setHgfLevel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:hgfLevel===m.id?700:400,color:hgfLevel===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:15,color:"#9CA3AF"}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="RESPONSE MODEL">
          {[{id:"A",label:"Model A",note:"β·EV + b  (beliefs only)"},
            {id:"B",label:"Model B",note:"+ γ·ΔHR  (direct autonomic)"},
            {id:"C",label:"Model C",note:"+ α·ΔHR·EV  (EV scaling)"},
          ].map(m=>(
            <label key={m.id} style={{display:"flex",gap:8,marginBottom:7,cursor:"pointer"}}>
              <input type="radio" checked={respModel===m.id} onChange={()=>{setRespModel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:respModel===m.id?700:400,color:respModel===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:15,color:"#9CA3AF"}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="ANS PHENOTYPES  (2×2)">
          {PHENOS.map(p=>(
            <button key={p.id} onClick={()=>{setPhenoId(p.id);setSel(null);}} style={{
              display:"block",width:"100%",textAlign:"left",padding:"7px 10px",marginBottom:4,
              borderRadius:6,border:`1.5px solid ${phenoId===p.id?p.color:"#E5E7EB"}`,
              background:phenoId===p.id?p.color+"14":"#FAFAFA",
              color:phenoId===p.id?p.color:"#374151",fontWeight:phenoId===p.id?700:400,fontSize:18,
            }}>
              <div>{p.label}</div>
              {p.ans&&<div style={{fontSize:15,opacity:0.78,marginTop:1}}>{p.ans}</div>}
              {p.params&&<div style={{fontSize:13,fontFamily:"STIX Two Text,Georgia,serif",marginTop:3,opacity:0.65}}>{p.params}</div>}
            </button>
          ))}
        </Blk>

        <Blk title="NOTATION">
          {[{sh:"hex",c:C.l3,t:"Volatility node (μ₃) — hidden state"},
            {sh:"cir",c:C.l2,t:"Belief node μ₂ — P(dangerous)"},
            {sh:"dia",c:C.l1,t:"Observation u (binary state)"},
            {sh:"sq", c:C.prm,t:"Fixed parameter"},
            {sh:"dia",c:C.dhr,t:"ΔHR / magnitude input"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={18} height={18} viewBox="0 0 18 18">
                {it.sh==="hex"&&<polygon points={hexPts(9,9,7)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="cir"&&<circle cx={9} cy={9} r={7} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="dia"&&<polygon points={diamPts(9,9,7,6)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="sq" &&<rect x={2} y={2} width={14} height={14} rx={2} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
              </svg>
              <span style={{fontSize:16,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
          <div style={{height:4}}/>
          {[{dash:false,col:C.eVal,t:"Value coupling (solid)"},
            {dash:true, col:C.eVol,t:"Volatility coupling (dashed)"},
            {dash:true, col:C.eRsp,t:"→ decision pathway"},
            {dash:true, col:C.eDHR,t:"ΔHR / PNS autonomic path"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={22} height={10} viewBox="0 0 22 10">
                <defs><marker id={`lm${i}`} markerWidth={6} markerHeight={5} refX={5} refY={2.5} orient="auto"><polygon points="0,0 6,2.5 0,5" fill={it.col}/></marker></defs>
                <line x1={1} y1={5} x2={16} y2={5} stroke={it.col} strokeWidth={2} strokeDasharray={it.dash?"4,2":"none"} markerEnd={`url(#lm${i})`}/>
              </svg>
              <span style={{fontSize:16,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
        </Blk>
      </div>

      {/* ── Main ────────────────────────────────────────────────────────────── */}
      <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>

        <div style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",padding:"14px 10px",
          boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flex:"0 0 auto",overflowX:"auto"}}
          onClick={e=>e.stopPropagation()}>

          <svg viewBox={`0 0 ${SW} ${SH}`} style={{width:"100%",maxWidth:SW,display:"block",margin:"0 auto"}}>
            <defs>
              <AM id="av"    color={C.eVal}/>  <AM id="av2"   color="#0a2d60"/>
              <AM id="avo"   color={C.eVol}/>  <AM id="avo2"  color="#CC7700"/>
              <AM id="ap"    color={C.ePrm}/>
              <AM id="ar"    color={C.eRsp}/>  <AM id="ar2"   color="#CC7700"/>
              <AM id="adhr"  color={C.eDHR}/>  <AM id="adhr2" color="#CC7700"/>
              <AM id="aev"   color={C.eEV}/>
              <AM id="atl3"  color={C.l3.stroke}/>
              <AM id="atl2"  color={C.l2.stroke}/>
            </defs>

                    stroke={hlEV?"#CC7700":C.eDHR} strokeWidth={hlEV?wDHR+1.5:wDHR/1.5}
                    strokeDasharray={hlEV?"none":"5,3"} markerEnd={hlEV?"url(#adhr2)":"url(#adhr)"} opacity={0.65}/>
                  <text x={(dhx-20+ex)/2+8} y={(dhy+ey)/2-6} fontSize={14} fill={C.eDHR} fontFamily="STIX Two Text,Georgia,serif" fontWeight={hlEV?800:600}>α</text>
                </g>}
                <g onClick={e=>click("dhr",e)} style={{cursor:"pointer"}}>
                  {(hlDHR||sel==="dhr")&&<polygon points={diamPts(dhx,dhy,32,26)} fill="none" stroke={hlDHR?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlDHR?"none":"4,2"} opacity={0.55}/>}
                  <polygon points={diamPts(dhx,dhy,24,19)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={dhx} y={dhy+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={15} fontWeight={700} fill={nc.text}>ΔHR</text>
                  {hlDHR&&<text x={dhx} y={dhy-28} textAnchor="middle" fontSize={26} fontWeight={800} fill="#CC8800">↑</text>}
                </g>
                <text x={dhx} y={dhy+32} textAnchor="middle" fontSize={14} fill="#9CA3AF">PNS (vagal)</text>
              </>);
            })()}

            {/* ── Response model ────────────────────────────────────────── */}
            <line x1={28} y1={respY-45} x2={SW_D-28} y2={respY-45} stroke="#D1D5DB" strokeWidth={1.5} strokeDasharray="9,5"/>
            <text x={SW_D/2} y={respY-32} textAnchor="middle" fontSize={14} fill="#9CA3AF" fontWeight={600} letterSpacing={1.5}>RESPONSE / DECISION MODEL</text>

            {(()=>{
              const ry=respY, bx=110;
              const respPs=[
                {pid:"beta",  label:"β", val:beta.toFixed(1)},
                {pid:"b",     label:"b", val:b.toFixed(2)},
                ...(hasDHR   ? [{pid:"gamma",label:"γ",val:gamma.toFixed(2)}] : []),
                ...(hasAlpha ? [{pid:"alpha",label:"α",val:alpha.toFixed(2)}] : []),
              ];
              return(<>{respPs.map((p,i)=>{
                const py=ry-2+i*26;
                return(<g key={p.pid} onClick={e=>click(p.pid,e)} style={{cursor:"pointer"}}>
                  <line x1={PX+13} y1={py} x2={bx} y2={py}
                    stroke={C.ePrm} strokeWidth={1.0} strokeDasharray="3,2" opacity={0.48}/>
                  <PSq x={PX} y={py} pid={p.pid} label={p.label}/>
                </g>);
              })}</>);
            })()}

            {(()=>{
              const ry=respY, nc=nC("resp",C.resp), bx=110, bw=SW_D-110-25;
              return(<g onClick={e=>click("resp",e)} style={{cursor:"pointer"}}>
                {(hlN("resp")||sel==="resp")&&<rect x={bx-7} y={ry-26} width={bw+14} height={76} rx={13}
                  fill="none" stroke={hlN("resp")?"#CC7700":"#2563EB"} strokeWidth={2}
                  strokeDasharray={hlN("resp")?"none":"5,3"} opacity={0.55}/>}
                <rect x={bx} y={ry-20} width={bw} height={66} rx={10}
                  fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                <text x={bx+bw/2} y={ry+1} textAnchor="middle" fontFamily="STIX Two Text,Georgia,serif"
                  fontSize={16} fontWeight={700} fill={nc.text}>{formula}</text>
                <text x={bx+bw/2} y={ry+18} textAnchor="middle" fontSize={15}
                  fill={nc.text} opacity={0.65}>approach (1) / avoid (0)</text>
              </g>);
            })()}

          </svg>
        </div>

        {/* Info panel — only when a node/edge is clicked */}
        {displayInfo&&<div style={{background:"#fff",borderRadius:10,padding:"13px 17px",
          border:"1.5px solid #E5E7EB",
          boxShadow:"0 1px 4px rgba(0,0,0,0.05)",flex:"0 0 auto"}}>
          <div style={{fontWeight:700,fontSize:20,marginBottom:5,color:"#111827"}}>
            {displayInfo.title}
          </div>
          <div style={{fontSize:18,color:"#4B5563",lineHeight:1.68,whiteSpace:"pre-line"}}>
            {displayInfo.body}
          </div>
        </div>}
      </div>
    </div>
  );
}

// ── Helper components ──────────────────────────────────────────────────────────
function Blk({title,children}){
  return<div style={{marginBottom:18}}>
    <div style={{fontSize:14,fontWeight:800,letterSpacing:1.2,color:"#9CA3AF",textTransform:"uppercase",marginBottom:8}}>{title}</div>
    {children}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
