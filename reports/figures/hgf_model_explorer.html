<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGF Model Explorer — psilocybin PRL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F3F4F6; font-size: 13px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #D1D5DB; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
  input[type=radio] { cursor: pointer; }
  button { border: none; font-family: inherit; cursor: pointer; transition: all 0.12s; }
  button:hover { filter: brightness(0.95); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── Color palette (HANDOFF doc spec) ─────────────────────────────────────────
const C = {
  l3:   { fill:"#FAECE7", stroke:"#993C1D", text:"#7a2a10" },
  l2:   { fill:"#E1F5EE", stroke:"#0F6E56", text:"#0a5040" },
  l1:   { fill:"#E6F1FB", stroke:"#185FA5", text:"#0d3d7a" },
  resp: { fill:"#EEEDFE", stroke:"#534AB7", text:"#3a2d90" },
  prm:  { fill:"#FFFBEF", stroke:"#9A7820", text:"#6b5200" },
  hl:   { fill:"#FFF3CC", stroke:"#CC8800", text:"#7a5000" },
  eVal:"#185FA5", eVol:"#993C1D", eRsp:"#534AB7", ePrm:"#9A7820",
};

// ── Hypotheses ────────────────────────────────────────────────────────────────
const HYPS = [
  { id:"none", label:"— Explore freely —", color:"#888", dir:null, sub:"",
    desc:"Click any node, edge, or parameter square to learn what it represents. Use the sliders to scale parameter magnitudes — each slider controls the thickness of its corresponding arrows.",
    hlN:[], hlE:[], hlP:[] },
  { id:"kappa_up", label:"H1: Psilocybin ↑κ", sub:"Enhanced volatility coupling", color:"#993C1D", dir:"up",
    desc:"Psilocybin strengthens κ — the coupling from the shared volatility node (x₃) to each cue-level belief. Higher κ means individual learning rates are more strongly driven by the current volatility estimate. Prediction: faster adaptation to reversals, especially mid-session when volatility uncertainty is highest.",
    hlN:["vol"], hlE:["vc0","vc1","vc2"], hlP:["kappa"] },
  { id:"omega2_up", label:"H2: Psilocybin ↑ω₂", sub:"Higher tonic volatility", color:"#0F6E56", dir:"up",
    desc:"ω₂ sets baseline uncertainty at level 2. Higher ω₂ → broader priors → persistently elevated learning rate regardless of the level-3 volatility estimate. The agent treats all outcomes as more surprising by default. Prediction: faster belief updating across all cues, slightly noisier choice trajectories.",
    hlN:["b0","b1","b2"], hlE:["val0","val1","val2"], hlP:["omega2"] },
  { id:"beta_up", label:"H3: Psilocybin ↑β", sub:"Sharper decision precision", color:"#534AB7", dir:"up",
    desc:"β (inverse temperature) controls how sharply beliefs drive choices. Higher β → winner-take-most behavior, stronger exploitation. Prediction: higher accuracy on stable acquisition phases, shorter switch latency after reversal — once beliefs update, choices follow immediately.",
    hlN:["resp"], hlE:["re0","re1","re2"], hlP:["beta"] },
  { id:"zeta_down", label:"H4: Psilocybin ↓ζ", sub:"Reduced choice stickiness", color:"#534AB7", dir:"down",
    desc:"ζ (stickiness) adds a choice-repeat bonus independent of beliefs. Lower ζ → choices are more purely belief-driven, less habitual. Prediction: fewer perseverative errors post-reversal, less momentum on correct-choice streaks during acquisition.",
    hlN:["resp"], hlE:["re0","re1","re2"], hlP:["zeta"] },
];

// ── Node info ─────────────────────────────────────────────────────────────────
const INFO = {
  i0: { title:"u_A — Cue A observation (node 0)", body:"Binary-state input node. Value = 1 when cue A was chosen and rewarded, 0 when chosen and unrewarded. Unchosen: observed=0, belief frozen (partial feedback protocol)." },
  i1: { title:"u_B — Cue B observation (node 2)", body:"Binary-state input node for cue B. Identical architecture to cue A branch. Only receives a signal on trials where cue B was chosen." },
  i2: { title:"u_C — Cue C observation (node 4)", body:"Binary-state input node for cue C." },
  b0: { title:"μ₁_A — Belief about cue A (node 1)", body:"Continuous-state node. Tracks reward probability of cue A in log-odds space. Precision-weighted PE at this level (ε₂_A) is theoretically linked to striatal RPE signals. Updated by ω₂ and (in 3-level) by κ·μ₂_vol." },
  b1: { title:"μ₁_B — Belief about cue B (node 3)", body:"Continuous-state node, parallel to cue A." },
  b2: { title:"μ₁_C — Belief about cue C (node 5)", body:"Continuous-state node, parallel to cue A and B." },
  vol: { title:"μ₂_vol — Shared volatility (node 6)", body:"Continuous-state node shared across all 3 cue branches. Estimates current environmental volatility. Its precision-weighted PE (ε₃) is theoretically linked to amygdala/noradrenaline signals. Only present in the 3-level HGF." },
  omega2: { title:"ω₂ — Tonic volatility (per branch)", body:"Log-scale baseline volatility for level-2 belief nodes. Higher ω₂ → broader priors → faster learning rate, independent of the level-3 node. Node attribute: tonic_volatility on nodes 1, 3, 5. Primary psilocybin hypothesis target." },
  omega3: { title:"ω₃ — Meta-volatility (level-3 node)", body:"Baseline volatility for the shared level-3 node. Controls how fast the volatility estimate itself can change. ⚠️ Known poor parameter recovery in the literature — interpret group-level ω₃ effects with caution." },
  kappa: { title:"κ — Volatility coupling strength", body:"Scales the influence of level-3 on level-2 learning rates. Effective LR ∝ exp(ω₂ + κ·μ₂). κ=0: collapses to 2-level behaviour. κ=1 (default): full volatility modulation. Key hypothesis: psilocybin ↑κ." },
  beta: { title:"β — Inverse temperature", body:"Decision precision. P(k) ∝ exp(β·μ₁_k + ζ·𝟙[prev=k]). Higher β → choices more sharply reflect current beliefs. Range: ~0.5–5 in empirical PRL fits." },
  zeta: { title:"ζ — Choice stickiness (perseveration)", body:"Bias for repeating the previous choice. ζ>0: perseveration. ζ<0: alternation. Positive values typical in PRL — may reflect motor habit or WM-based choice repetition." },
  val0: { title:"Value coupling: μ₁_A ↔ u_A", body:"Bidirectional message passing. Downward: belief → prediction for u_A. Upward: precision-weighted PE (ε₁_A) propagates back to update μ₁_A. Solid blue = value coupling. Edge thickness scales with ω₂." },
  val1: { title:"Value coupling: μ₁_B ↔ u_B", body:"Same architecture as cue A branch." },
  val2: { title:"Value coupling: μ₁_C ↔ u_C", body:"Same architecture as cue A branch." },
  vc0: { title:"Volatility coupling: x₃ → μ₁_A", body:"Level-3 node modulates effective volatility of cue A belief. Coupling strength κ. Dashed coral = volatility coupling (distinct from value coupling — this is about precision, not reward value). Edge thickness scales with κ." },
  vc1: { title:"Volatility coupling: x₃ → μ₁_B", body:"Same architecture." },
  vc2: { title:"Volatility coupling: x₃ → μ₁_C", body:"Same architecture." },
  re0: { title:"Belief → response model (cue A)", body:"μ₁_A feeds into the response model as expected value for cue A. Read-only: does NOT feed back into the HGF." },
  re1: { title:"Belief → response model (cue B)", body:"Same as cue A." },
  re2: { title:"Belief → response model (cue C)", body:"Same as cue A." },
  resp: { title:"Response model — softmax with stickiness", body:"Choice probabilities: P(k) ∝ exp(β·μ₁_k + ζ·𝟙[prev=k]). β controls exploitation vs. exploration; ζ adds trial-level choice history. Separate from the HGF generative model — it maps beliefs to observed choices." },
};

// ── SVG helpers ───────────────────────────────────────────────────────────────
const hexPts = (cx, cy, r) =>
  Array.from({length:6},(_,i)=>{const a=(Math.PI/3)*i-Math.PI/6; return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(" ");
const diamPts = (cx,cy,rx,ry) => `${cx},${cy-ry} ${cx+rx},${cy} ${cx},${cy+ry} ${cx-rx},${cy}`;
const retract = (x1,y1,x2,y2,d) => { const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy); return len<1?[x2,y2]:[x2-(dx/len)*d,y2-(dy/len)*d]; };

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [model,  setModel]  = useState("3level");
  const [omega2, setOmega2] = useState(-4);
  const [omega3, setOmega3] = useState(-4);
  const [kappa,  setKappa]  = useState(1.0);
  const [beta,   setBeta]   = useState(1.5);
  const [zeta,   setZeta]   = useState(0.3);
  const [hypId,  setHypId]  = useState("none");
  const [sel,    setSel]    = useState(null);

  const hyp = HYPS.find(h => h.id === hypId);
  const is3 = model === "3level";

  const hlN = id => hyp.hlN.includes(id);
  const hlE = id => hyp.hlE.includes(id);
  const hlP = id => hyp.hlP.includes(id);

  // Edge width driven by sliders
  const wVal  = 1.2 + Math.max(0, omega2+8)*0.38;
  const wVol  = 0.7 + kappa*2.6;
  const wBeta = 0.8 + beta*0.55;

  // Layout
  const COLS=[115,350,585], SW=700;
  const rowV=82, rowB=is3?238:165, rowI=is3?388:305;
  const sepY=rowI+56, respY=rowI+120, SH=respY+90;

  const click = (id,e) => { e && e.stopPropagation(); setSel(p => p===id?null:id); };

  // Node/edge coloring
  const nC = (id, base) => hlN(id) ? C.hl : (sel===id ? {...base,stroke:"#2563EB"} : base);
  const eC = (id, def)  => hlE(id) ? "#CC7700" : def;
  const pC = id => hlP(id) ? C.hl : C.prm;

  const displayInfo = useMemo(() => {
    if (sel && INFO[sel]) return INFO[sel];
    if (hypId !== "none") return { title:`${hyp.label}${hyp.sub?" — "+hyp.sub:""}`, body:hyp.desc };
    return { title:"HGF Graphical Model", body:"Select a hypothesis to highlight pathways. Click any element to inspect it. Sliders control parameter magnitudes — edge thickness scales in real time." };
  }, [sel, hypId]);

  // ── Local sub-components (closure over state) ─────────────────────────────
  const DirBadge = ({x,y}) => hyp.dir ? (
    <text x={x} y={y} textAnchor="middle" fontSize={17} fontWeight={800} fill="#CC8800">{hyp.dir==="up"?"↑":"↓"}</text>
  ) : null;

  const PSq = ({x,y,pid,label}) => {
    const cc=pC(pid);
    return (
      <g onClick={e=>click(pid,e)} style={{cursor:"pointer"}}>
        {sel===pid && <rect x={x-18} y={y-18} width={36} height={36} rx={6} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.6}/>}
        <rect x={x-13} y={y-13} width={26} height={26} rx={3} fill={cc.fill} stroke={cc.stroke} strokeWidth={sel===pid?2.2:1.5}/>
        <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontFamily="Georgia,serif" fontSize={12} fontWeight={700} fill={cc.text}>{label}</text>
        {hlP(pid) && <DirBadge x={x+18} y={y-12}/>}
      </g>
    );
  };

  const ArrMarker = ({id,color}) => (
    <marker id={id} markerWidth={8} markerHeight={6} refX={7} refY={3} orient="auto">
      <polygon points="0,0 8,3 0,6" fill={color}/>
    </marker>
  );

  return (
    <div style={{display:"flex",minHeight:"100vh"}} onClick={()=>setSel(null)}>

      {/* ── Sidebar ──────────────────────────────────────────────────────── */}
      <div style={{width:272,background:"#fff",borderRight:"1px solid #E5E7EB",padding:"20px 18px",overflowY:"auto",flexShrink:0}} onClick={e=>e.stopPropagation()}>

        <div style={{fontWeight:800,fontSize:15,color:"#111827",marginBottom:2}}>HGF Model Explorer</div>
        <div style={{fontSize:11,color:"#9CA3AF",marginBottom:22}}>pick_best_cue · 3-cue PRL · psilocybin study</div>

        <Blk title="MODEL">
          {[{id:"2level",label:"2-level HGF",note:"ω₂ only · no shared volatility"},
            {id:"3level",label:"3-level HGF",note:"ω₂ + ω₃ + κ · shared volatility"}].map(m=>(
            <label key={m.id} style={{display:"flex",alignItems:"flex-start",gap:9,marginBottom:9,cursor:"pointer"}}>
              <input type="radio" checked={model===m.id} onChange={()=>{setModel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:model===m.id?700:400,color:model===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:10,color:"#9CA3AF",marginTop:1}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="PARAMETERS  ↔  EDGE THICKNESS">
          <Sldr label="ω₂" hint="tonic volatility"    val={omega2} min={-8}   max={0}   step={0.1}  hl={hlP("omega2")} fmt={v=>v.toFixed(1)}  onChange={setOmega2}/>
          {is3 && <>
            <Sldr label="ω₃" hint="meta-volatility"   val={omega3} min={-8}   max={0}   step={0.1}  hl={hlP("omega3")} fmt={v=>v.toFixed(1)}  onChange={setOmega3}/>
            <Sldr label="κ"  hint="vol. coupling"     val={kappa}  min={0}    max={2.5} step={0.05} hl={hlP("kappa")}  fmt={v=>v.toFixed(2)} onChange={setKappa}/>
          </>}
          <Sldr label="β"  hint="inverse temperature" val={beta}   min={0.2}  max={6}   step={0.1}  hl={hlP("beta")}   fmt={v=>v.toFixed(1)}  onChange={setBeta}/>
          <Sldr label="ζ"  hint="stickiness"          val={zeta}   min={-0.5} max={2.5} step={0.05} hl={hlP("zeta")}   fmt={v=>v.toFixed(2)} onChange={setZeta}/>
        </Blk>

        <Blk title="HYPOTHESES">
          {HYPS.filter(h=>is3||h.id!=="kappa_up").map(h=>(
            <button key={h.id} onClick={()=>{setHypId(h.id);setSel(null);}} style={{
              display:"block",width:"100%",textAlign:"left",padding:"8px 11px",marginBottom:5,
              borderRadius:7,border:`1.5px solid ${hypId===h.id?h.color:"#E5E7EB"}`,
              background:hypId===h.id?h.color+"14":"#FAFAFA",
              color:hypId===h.id?h.color:"#374151",
              fontWeight:hypId===h.id?700:400,fontSize:12,
            }}>
              <div>{h.label}</div>
              {h.sub && <div style={{fontSize:10,opacity:0.75,marginTop:1}}>{h.sub}</div>}
            </button>
          ))}
        </Blk>

        <Blk title="NOTATION">
          {[{sh:"hex",c:C.l3,t:"Hidden state x₃ (volatility)"},
            {sh:"cir",c:C.l2,t:"Belief node μ₁ₖ"},
            {sh:"dia",c:C.l1,t:"Observation uₖ"},
            {sh:"sq", c:C.prm,t:"Fixed parameter"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={20} height={20} viewBox="0 0 20 20">
                {it.sh==="hex" && <polygon points={hexPts(10,10,8)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="cir" && <circle cx={10} cy={10} r={8} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="dia" && <polygon points={diamPts(10,10,8,7)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="sq"  && <rect x={3} y={3} width={14} height={14} rx={2} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
              </svg>
              <span style={{fontSize:11,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
          <div style={{height:5}}/>
          {[{dash:false,col:C.eVal,t:"Value coupling (solid)"},
            {dash:true, col:C.eVol,t:"Volatility coupling (dashed)"},
            {dash:true, col:C.eRsp,t:"Belief → decision (dashed)"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={22} height={10} viewBox="0 0 22 10">
                <defs><marker id={`lm${i}`} markerWidth={6} markerHeight={5} refX={5} refY={2.5} orient="auto"><polygon points="0,0 6,2.5 0,5" fill={it.col}/></marker></defs>
                <line x1={1} y1={5} x2={16} y2={5} stroke={it.col} strokeWidth={2} strokeDasharray={it.dash?"4,2":"none"} markerEnd={`url(#lm${i})`}/>
              </svg>
              <span style={{fontSize:11,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
        </Blk>
      </div>

      {/* ── Main ─────────────────────────────────────────────────────────── */}
      <div style={{flex:1,padding:24,display:"flex",flexDirection:"column",gap:14,overflowY:"auto"}}>

        {/* SVG diagram */}
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",padding:"18px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}
          onClick={e=>e.stopPropagation()}>
          <svg viewBox={`0 0 ${SW} ${SH}`} style={{width:"100%",maxWidth:SW,display:"block",margin:"0 auto"}}>
            <defs>
              <ArrMarker id="av"   color={C.eVal}/>
              <ArrMarker id="av2"  color="#0a2d60"/>
              <ArrMarker id="avo"  color={C.eVol}/>
              <ArrMarker id="avo2" color="#CC7700"/>
              <ArrMarker id="ap"   color={C.ePrm}/>
              <ArrMarker id="ar"   color={C.eRsp}/>
              <ArrMarker id="ar2"  color="#CC7700"/>
            </defs>

            {/* LEVEL 3 */}
            {is3 && (() => {
              const vx=COLS[1],vy=rowV,nc=nC("vol",C.l3);
              return (<>
                <text x={18} y={vy+4} fontSize={9} fontWeight={700} fill={C.l3.stroke} opacity={0.65}>LEVEL 3</text>

                {/* volatility coupling arrows */}
                {COLS.map((bx,i) => {
                  const eid=`vc${i}`,hl=hlE(eid);
                  const [ex,ey]=retract(vx,vy,bx,rowB,26);
                  const [sx,sy]=retract(bx,rowB,vx,vy,34);
                  const col=eC(eid,C.eVol), sw=hl?wVol+1.8:wVol;
                  const mx=(sx+ex)/2, my=(sy+ey)/2;
                  return (
                    <g key={i} onClick={e=>click(eid,e)} style={{cursor:"pointer"}}>
                      <line x1={sx} y1={sy} x2={ex} y2={ey} stroke="transparent" strokeWidth={16}/>
                      <line x1={sx} y1={sy} x2={ex} y2={ey} stroke={col} strokeWidth={sw}
                        strokeDasharray={hl?"none":"8,4"} markerEnd={hl?"url(#avo2)":"url(#avo)"} opacity={0.88}/>
                      <text x={mx+(i===0?-16:i===2?16:12)} y={my-9}
                        fontSize={10} fontWeight={hl?800:600} fill={col} fontFamily="Georgia,serif">κ</text>
                      {(hl||sel===eid) && <DirBadge x={mx+(i===0?-30:i===2?30:30)} y={my}/>}
                    </g>
                  );
                })}

                {/* vol hex node */}
                <g onClick={e=>click("vol",e)} style={{cursor:"pointer"}}>
                  {(hlN("vol")||sel==="vol") && <polygon points={hexPts(vx,vy,40)} fill="none" stroke={hlN("vol")?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlN("vol")?"none":"5,3"} opacity={0.55}/>}
                  <polygon points={hexPts(vx,vy,30)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={vx} y={vy-4} textAnchor="middle" dominantBaseline="middle" fontFamily="Georgia,serif" fontSize={12} fontWeight={700} fill={nc.text}>μ₂</text>
                  <text x={vx} y={vy+10} textAnchor="middle" fontSize={9} fill={nc.text} opacity={0.75}>vol</text>
                  {hlN("vol") && <DirBadge x={vx+44} y={vy-16}/>}
                </g>

                {/* ω₃ param */}
                <line x1={vx+58} y1={vy-11} x2={vx+36} y2={vy-4} stroke={C.ePrm} strokeWidth={1.2} strokeDasharray="3,2" markerEnd="url(#ap)"/>
                <PSq x={vx+70} y={vy-16} pid="omega3" label="ω₃"/>
              </>);
            })()}

            {/* LEVEL 2 belief nodes */}
            {(() => {
              const lbls=["μ₁_A","μ₁_B","μ₁_C"];
              return (<>
                <text x={18} y={rowB+4} fontSize={9} fontWeight={700} fill={C.l2.stroke} opacity={0.65}>LEVEL 2</text>
                {COLS.map((cx,i) => {
                  const bid=`b${i}`,nc=nC(bid,C.l2);
                  return (
                    <g key={i}>
                      {/* ω₂ param square left of each belief node */}
                      <g onClick={e=>click("omega2",e)} style={{cursor:"pointer"}}>
                        <line x1={cx-46} y1={rowB-3} x2={cx-30} y2={rowB} stroke={C.ePrm} strokeWidth={1.2} strokeDasharray="3,2" markerEnd="url(#ap)"/>
                        {i===0 && <PSq x={cx-58} y={rowB-13} pid="omega2" label="ω₂"/>}
                      </g>
                      {/* belief circle */}
                      <g onClick={e=>click(bid,e)} style={{cursor:"pointer"}}>
                        <circle cx={cx} cy={rowB} r={31} fill="none" stroke={C.l2.stroke} strokeWidth={1} strokeDasharray="5,3" opacity={0.28}/>
                        {(hlN(bid)||sel===bid) && <circle cx={cx} cy={rowB} r={34} fill="none" stroke={hlN(bid)?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlN(bid)?"none":"5,3"} opacity={0.55}/>}
                        <circle cx={cx} cy={rowB} r={24} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                        <text x={cx} y={rowB+1} textAnchor="middle" dominantBaseline="middle" fontFamily="Georgia,serif" fontSize={11} fontWeight={700} fill={nc.text}>{lbls[i]}</text>
                        {hlN(bid) && <DirBadge x={cx+32} y={rowB-20}/>}
                      </g>
                    </g>
                  );
                })}
              </>);
            })()}

            {/* Value coupling arrows: beliefs → inputs */}
            {COLS.map((cx,i) => {
              const eid=`val${i}`,hl=hlE(eid),col=eC(eid,C.eVal),sw=hl?wVal+1.5:wVal;
              return (
                <g key={i} onClick={e=>click(eid,e)} style={{cursor:"pointer"}}>
                  <line x1={cx} y1={rowB+25} x2={cx} y2={rowI-21} stroke="transparent" strokeWidth={14}/>
                  <line x1={cx} y1={rowB+25} x2={cx} y2={rowI-21} stroke={col} strokeWidth={sw} markerEnd={hl?"url(#av2)":"url(#av)"} opacity={0.88}/>
                </g>
              );
            })}

            {/* LEVEL 1 input diamond nodes */}
            {(() => {
              const ilbls=["u_A","u_B","u_C"],cues=["Cue A","Cue B","Cue C"];
              return (<>
                <text x={18} y={rowI+4} fontSize={9} fontWeight={700} fill={C.l1.stroke} opacity={0.65}>LEVEL 1</text>
                {COLS.map((cx,i) => {
                  const iid=`i${i}`,nc=nC(iid,C.l1);
                  return (
                    <g key={i} onClick={e=>click(iid,e)} style={{cursor:"pointer"}}>
                      {sel===iid && <polygon points={diamPts(cx,rowI,30,24)} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.5}/>}
                      <polygon points={diamPts(cx,rowI,24,19)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                      <text x={cx} y={rowI+1} textAnchor="middle" dominantBaseline="middle" fontFamily="Georgia,serif" fontSize={11} fontWeight={700} fill={nc.text}>{ilbls[i]}</text>
                      <text x={cx} y={rowI+32} textAnchor="middle" fontSize={10} fill="#9CA3AF">{cues[i]}</text>
                    </g>
                  );
                })}
              </>);
            })()}

            {/* Separator */}
            <line x1={28} y1={sepY} x2={SW-28} y2={sepY} stroke="#D1D5DB" strokeWidth={1.5} strokeDasharray="9,5"/>
            <text x={SW/2} y={sepY+13} textAnchor="middle" fontSize={9} fill="#9CA3AF" fontWeight={600} letterSpacing={1.5}>RESPONSE MODEL</text>

            {/* Belief → response arrows */}
            {COLS.map((cx,i) => {
              const eid=`re${i}`,hl=hlE(eid),col=eC(eid,C.eRsp),sw=hl?wBeta+0.8:1.1;
              const destX=SW/2+(i===0?-130:i===2?130:0);
              const [ex,ey]=retract(cx,sepY+16,destX,respY-32,4);
              return (
                <g key={i} onClick={e=>click(eid,e)} style={{cursor:"pointer"}}>
                  <line x1={cx} y1={sepY+17} x2={ex} y2={ey} stroke="transparent" strokeWidth={12}/>
                  <line x1={cx} y1={sepY+17} x2={ex} y2={ey} stroke={col} strokeWidth={sw}
                    strokeDasharray="5,3" opacity={0.42} markerEnd={hl?"url(#ar2)":"url(#ar)"}/>
                </g>
              );
            })}

            {/* Response model box */}
            {(() => {
              const ry=respY,nc=nC("resp",C.resp),bx=78,bw=SW-156;
              return (
                <g onClick={e=>click("resp",e)} style={{cursor:"pointer"}}>
                  {(hlN("resp")||sel==="resp") && <rect x={bx-7} y={ry-38} width={bw+14} height={80} rx={13} fill="none" stroke={hlN("resp")?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlN("resp")?"none":"5,3"} opacity={0.55}/>}
                  <rect x={bx} y={ry-32} width={bw} height={68} rx={10} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={SW/2} y={ry-10} textAnchor="middle" fontFamily="Georgia,serif" fontSize={12} fontWeight={700} fill={nc.text}>
                    P(choose k) ∝ exp( β · μ₁ₖ  +  ζ · 𝟙[prev = k] )
                  </text>
                  <text x={SW/2} y={ry+8} textAnchor="middle" fontSize={10} fill={nc.text} opacity={0.7}>softmax with stickiness</text>
                  {hlN("resp") && <DirBadge x={bx+bw+18} y={ry-10}/>}
                  {/* β square */}
                  <g onClick={e=>click("beta",e)}>
                    <PSq x={SW/2-65} y={ry+28} pid="beta" label="β"/>
                    <text x={SW/2-65} y={ry+48} textAnchor="middle" fontSize={9} fill={C.prm.text}>{beta.toFixed(1)}</text>
                  </g>
                  {/* ζ square */}
                  <g onClick={e=>click("zeta",e)}>
                    <PSq x={SW/2+65} y={ry+28} pid="zeta" label="ζ"/>
                    <text x={SW/2+65} y={ry+48} textAnchor="middle" fontSize={9} fill={C.prm.text}>{zeta.toFixed(2)}</text>
                  </g>
                </g>
              );
            })()}

          </svg>
        </div>

        {/* Info panel */}
        <div style={{background:"#fff",borderRadius:10,padding:"14px 18px",
          border:`1.5px solid ${sel?"#E5E7EB":hypId!=="none"?hyp.color:"#E5E7EB"}`,
          boxShadow:"0 1px 4px rgba(0,0,0,0.05)",minHeight:70}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:5,color:sel?"#111827":hypId!=="none"?hyp.color:"#374151"}}>
            {displayInfo.title}
          </div>
          <div style={{fontSize:12,color:"#4B5563",lineHeight:1.7}}>
            {displayInfo.body}
          </div>
        </div>

      </div>
    </div>
  );
}

// ── Helper components ─────────────────────────────────────────────────────────
function Blk({title,children}) {
  return (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:9,fontWeight:800,letterSpacing:1.2,color:"#9CA3AF",textTransform:"uppercase",marginBottom:9}}>{title}</div>
      {children}
    </div>
  );
}
function Sldr({label,hint,val,min,max,step,hl,fmt,onChange}) {
  return (
    <div style={{marginBottom:13}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontFamily:"Georgia,serif",fontWeight:700,fontSize:14,color:hl?"#CC7700":"#1F2937"}}>{label}</span>
          <span style={{fontSize:10,color:"#9CA3AF"}}>{hint}</span>
        </div>
        <span style={{fontSize:12,fontWeight:hl?700:500,color:hl?"#CC7700":"#374151"}}>{fmt(val)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={val}
        onChange={e=>onChange(parseFloat(e.target.value))}
        style={{width:"100%",accentColor:hl?"#CC7700":"#185FA5"}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
