<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGF Viewer</title>
<!-- v1.3 injection markers (EXPORT-02). render_viewer_html does string-surgery
     on the content between these tag delimiters. The default content below is a
     valid NetworkSpec so the template renders a meaningful visualization when
     opened directly in a browser without Python (research §2 Strategy B). -->
<script type="application/json" id="viz-network-spec">
{
  "n_nodes": 3,
  "input_idxs": [0],
  "nodes": [
    {"idx": 0, "kind": "binary-state", "level": 1, "role": "input", "branch_idx": 0,
     "value_parents": [1], "volatility_parents": [], "value_children": [], "volatility_children": []},
    {"idx": 1, "kind": "continuous-state", "level": 2, "role": "value", "branch_idx": 0,
     "value_parents": [], "volatility_parents": [2], "value_children": [0], "volatility_children": []},
    {"idx": 2, "kind": "continuous-state", "level": 3, "role": "volatility", "branch_idx": 0,
     "value_parents": [], "volatility_parents": [], "value_children": [], "volatility_children": [1]}
  ],
  "coord_name": null,
  "source_pyhgf_version": "0.2.8",
  "is_laplace": false
}
</script>
<script type="application/json" id="viz-posterior-summary"></script>
{% if react_inlined and react_dom_inlined and babel_inlined %}
<script>{{ react_inlined | safe }}</script>
<script>{{ react_dom_inlined | safe }}</script>
<script>{{ babel_inlined | safe }}</script>
{% else %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
{% endif %}
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', 'Source Sans Pro', sans-serif; background: #F3F4F6; font-size: 20px; }
  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
    background: #D1D5DB; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
  input[type=radio] { cursor: pointer; }
  button { border: none; font-family: inherit; cursor: pointer; }
  button:hover { filter: brightness(0.95); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Injected NetworkSpec + posterior summary (research §6 canonical pattern) ──
// Parsed once at module load from the <script type="application/json"> marker tags.
const NETWORK_SPEC = JSON.parse(
  document.getElementById("viz-network-spec").textContent
);

const POSTERIOR_SUMMARY = (() => {
  const el = document.getElementById("viz-posterior-summary");
  if (!el || !el.textContent.trim()) return null;
  try {
    return JSON.parse(el.textContent);
  } catch {
    return null;
  }
})();

// ── P10 guard: derive initial HGF level from NetworkSpec, never hardcoded ─────
// 3-level if any node lives at level >= 3; multimodal 2-level if >1 input;
// otherwise a plain 2-level. Replaces the old hardcoded-string useState fallback.
const INITIAL_HGF_LEVEL = (() => {
  const maxL = NETWORK_SPEC.nodes.reduce((m, n) => Math.max(m, n.level), 0);
  if (maxL >= 3) return "3level";
  if (NETWORK_SPEC.input_idxs.length > 1) return "2level_mm";
  return "2level";
})();

// ── Color palette ──────────────────────────────────────────────────────────────
const C = {
  l3:   { fill:"#FAECE7", stroke:"#993C1D", text:"#7a2a10" },  // coral  – volatility
  l2:   { fill:"#E1F5EE", stroke:"#0F6E56", text:"#0a5040" },  // teal   – belief
  l1:   { fill:"#E6F1FB", stroke:"#185FA5", text:"#0d3d7a" },  // blue   – input
  resp: { fill:"#EEEDFE", stroke:"#534AB7", text:"#3a2d90" },  // purple – response
  prm:  { fill:"#FFFBEF", stroke:"#9A7820", text:"#6b5200" },  // gold   – parameters
  hl:   { fill:"#FFF3CC", stroke:"#CC8800", text:"#7a5000" },  // amber  – highlight
  eVal:"#185FA5", eVol:"#993C1D", eRsp:"#534AB7", ePrm:"#9A7820",
};

// ── Node / edge info ───────────────────────────────────────────────────────────
const INFO = {
  input:  { title:"u — Input observation node", body:"Input node (idx in NETWORK_SPEC.input_idxs)." },
  belief: { title:"μ₂ — Belief node", body:"Continuous-state belief (level 2)." },
  vol:    { title:"μ₃ — Volatility node", body:"Continuous-state volatility (level 3, 3-level HGF only)." },
  resp:   { title:"Response model node", body:"Response model node." },
  omega2: { title:"ω₂ — Tonic volatility (level 2)", body:"Log-scale baseline volatility on the belief node. Higher (less negative) → broader priors → faster belief updating." },
  omega3: { title:"ω₃ — Meta-volatility (level 3)", body:"Baseline volatility for the level-3 volatility node." },
  kappa:  { title:"κ — Volatility coupling (level 3 → level 2)", body:"Scales how strongly volatility modulates the belief learning rate." },
  mu3_0:  { title:"μ₃⁰ — Initial volatility prior mean (level 3)", body:"Starting value of the volatility estimate before any data." },
  beta:   { title:"β — Inverse temperature", body:"Scales how strongly value differences drive choice probability." },
  b:      { title:"b — Bias intercept", body:"Constant offset on the decision logit." },
  val:    { title:"Value coupling (pyhgf value_children)", body:"Value coupling between belief and input nodes. Solid blue arrow." },
  kappa_e:{ title:"Volatility coupling (pyhgf volatility_children)", body:"Level-3 modulates effective precision of level-2 belief node. Dashed coral arrow. Only in 3-level model." },
};

// ── SVG geometry ───────────────────────────────────────────────────────────────
const hexPts=(cx,cy,r)=>Array.from({length:6},(_,i)=>{const a=(Math.PI/3)*i-Math.PI/6;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(" ");
const diamPts=(cx,cy,rx,ry)=>`${cx},${cy-ry} ${cx+rx},${cy} ${cx},${cy+ry} ${cx-rx},${cy}`;
const retract=(x1,y1,x2,y2,d)=>{const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);return len<1?[x2,y2]:[x2-(dx/len)*d,y2-(dy/len)*d];};

// ── Main component ─────────────────────────────────────────────────────────────
function App() {
  const [hgfLevel, setHgfLevel] = useState(INITIAL_HGF_LEVEL);
  const omega2 = -3.0, omega3 = -4.0, kappa = 1.0, mu3_0 = 1.0;
  const beta = 2.0, b = 0.0;
  const [sel,    setSel]    = useState(null);

  const is3  = hgfLevel === "3level";
  const isMM = hgfLevel === "2level_mm";

  // Edge widths from spec params
  const wVal  = 1.2 + Math.max(0, omega2+8)*0.38;
  const wVol  = 0.7 + kappa*2.6;
  const wEV   = 0.8 + beta*0.55;

  // Layout
  const CX=350, SW_D=700, SW_EQ=310, SW=SW_D+SW_EQ;
  const GX=175, PX=90;
  const EQX = SW_D + 22;
  const rowV = 85;
  const rowB = is3 ? 245 : 165;
  const rowI = is3 ? 390 : 305;
  const evY  = rowI + 92;
  const respY = evY + 104;
  const SH   = respY + 104;

  const click = (id,e) => { e&&e.stopPropagation(); setSel(p=>p===id?null:id); };
  const nC = (id,base) => sel===id ? {...base,stroke:"#2563EB"} : base;
  const eC = (id,def)  => def;
  const pC = id        => C.prm;
  const hlN = id => false;
  const hlE = id => false;

  const displayInfo = (sel && INFO[sel]) ? INFO[sel] : null;

  const PSq = ({x,y,pid,label,disabled}) => {
    const cc = disabled ? {fill:"#F9FAFB",stroke:"#D1D5DB",text:"#9CA3AF"} : pC(pid);
    return(<g onClick={disabled?undefined:e=>click(pid,e)} style={{cursor:disabled?"default":"pointer",opacity:disabled?0.45:1}}>
      {sel===pid&&!disabled&&<rect x={x-18} y={y-18} width={36} height={36} rx={6} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.6}/>}
      <rect x={x-13} y={y-13} width={26} height={26} rx={3} fill={cc.fill} stroke={cc.stroke} strokeWidth={sel===pid?2.2:1.5}/>
      <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={18} fontWeight={700} fill={cc.text}>{label}</text>
    </g>);
  };

  const AM = ({id,color}) => (<marker id={id} markerWidth={8} markerHeight={6} refX={7} refY={3} orient="auto"><polygon points="0,0 8,3 0,6" fill={color}/></marker>);

  // TEMPLATE-09 PARTIAL: generic placeholder only;
  // spec-derived rendering from NetworkSpec.response_model deferred to
  // Phase 24 pending schema extension.
  const formula = "Decision equation: rendered per response model (injected)";

  const EqLine = ({x,y,text,isMath,isNote,color}) => (
    <text x={x} y={y}
      fontFamily={isMath ? "STIX Two Text,Georgia,serif" : "inherit"}
      fontSize={isMath ? 17 : isNote ? 14 : 15}
      fontWeight={isMath ? 600 : 400}
      fill={color || (isMath ? "#111827" : isNote ? "#9CA3AF" : "#4B5563")}>
      {text}
    </text>
  );

  const EqHeader = ({x,y,text,color}) => (
    <text x={x} y={y} fontSize={14} fontWeight={800} letterSpacing={0.8} fill={color||"#374151"}>
      {text}
    </text>
  );

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Source Sans 3','Source Sans Pro',sans-serif",fontSize:20,background:"#F3F4F6",overflow:"hidden"}} onClick={()=>setSel(null)}>

      {/* ── Sidebar ─────────────────────────────────────────────────────────── */}
      <div style={{width:278,background:"#fff",borderRight:"1px solid #E5E7EB",padding:"18px 16px",overflowY:"auto",flexShrink:0}} onClick={e=>e.stopPropagation()}>


        <Blk title="HGF LEVEL">
          {[{id:"2level",label:"2-level",note:"ω₂ only · fixed learning rate"},
            {id:"3level",label:"3-level",note:"ω₂ + ω₃ + κ · adaptive learning rate"},
            {id:"2level_mm",label:"2-level multimodal",note:"ω₂ only · two observation channels"}].map(m=>(
            <label key={m.id} style={{display:"flex",gap:8,marginBottom:8,cursor:"pointer"}}>
              <input type="radio" checked={hgfLevel===m.id} onChange={()=>{setHgfLevel(m.id);setSel(null);}} style={{marginTop:2}}/>
              <div>
                <div style={{fontWeight:hgfLevel===m.id?700:400,color:hgfLevel===m.id?"#111":"#6B7280"}}>{m.label}</div>
                <div style={{fontSize:15,color:"#9CA3AF"}}>{m.note}</div>
              </div>
            </label>
          ))}
        </Blk>

        <Blk title="NOTATION">
          {[{sh:"hex",c:C.l3,t:"Volatility node (μ₃) — hidden state"},
            {sh:"cir",c:C.l2,t:"Belief node μ₂"},
            {sh:"dia",c:C.l1,t:"Observation u (input)"},
            {sh:"sq", c:C.prm,t:"Fixed parameter"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={18} height={18} viewBox="0 0 18 18">
                {it.sh==="hex"&&<polygon points={hexPts(9,9,7)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="cir"&&<circle cx={9} cy={9} r={7} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="dia"&&<polygon points={diamPts(9,9,7,6)} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
                {it.sh==="sq" &&<rect x={2} y={2} width={14} height={14} rx={2} fill={it.c.fill} stroke={it.c.stroke} strokeWidth={1.5}/>}
              </svg>
              <span style={{fontSize:16,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
          <div style={{height:4}}/>
          {[{dash:false,col:C.eVal,t:"Value coupling (solid)"},
            {dash:true, col:C.eVol,t:"Volatility coupling (dashed)"}].map((it,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <svg width={22} height={10} viewBox="0 0 22 10">
                <defs><marker id={`lm${i}`} markerWidth={6} markerHeight={5} refX={5} refY={2.5} orient="auto"><polygon points="0,0 6,2.5 0,5" fill={it.col}/></marker></defs>
                <line x1={1} y1={5} x2={16} y2={5} stroke={it.col} strokeWidth={2} strokeDasharray={it.dash?"4,2":"none"} markerEnd={`url(#lm${i})`}/>
              </svg>
              <span style={{fontSize:16,color:"#6B7280"}}>{it.t}</span>
            </div>
          ))}
        </Blk>
      </div>

      {/* ── Main ────────────────────────────────────────────────────────────── */}
      <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>

        <div style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",padding:"14px 10px",
          boxShadow:"0 1px 4px rgba(0,0,0,0.06)",flex:"0 0 auto",overflowX:"auto"}}
          onClick={e=>e.stopPropagation()}>

          <svg viewBox={`0 0 ${SW} ${SH}`} style={{width:"100%",maxWidth:SW,display:"block",margin:"0 auto"}}>
            <defs>
              <AM id="av"    color={C.eVal}/>  <AM id="av2"   color="#0a2d60"/>
              <AM id="avo"   color={C.eVol}/>  <AM id="avo2"  color="#CC7700"/>
              <AM id="ap"    color={C.ePrm}/>
              <AM id="ar"    color={C.eRsp}/>  <AM id="ar2"   color="#CC7700"/>
              <AM id="atl3"  color={C.l3.stroke}/>
              <AM id="atl2"  color={C.l2.stroke}/>
            </defs>

            {/* ── Level background bands ─────────────────────────────────── */}
            {is3&&<rect x={8} y={rowV-35} width={SW_D-16} height={96} rx={10} fill={C.l3.stroke} opacity={0.07}/>}
            <rect x={8} y={rowB-40} width={SW_D-16} height={90} rx={10} fill={C.l2.stroke} opacity={0.07}/>
            <rect x={8} y={rowI-32} width={SW_D-16} height={88} rx={10} fill={C.l1.stroke} opacity={0.07}/>
            <rect x={8} y={evY+30} width={SW_D-16} height={respY+76-evY-30} rx={10} fill={C.resp.stroke} opacity={0.06}/>

            {/* ── Equations panel background ────────────────────────────── */}
            <rect x={SW_D+2} y={8} width={SW_EQ-4} height={SH-16} rx={10} fill="#F8FAFC"/>
            <line x1={SW_D+2} y1={20} x2={SW_D+2} y2={SH-20} stroke="#E5E7EB" strokeWidth={1}/>
            <text x={SW_D+SW_EQ/2} y={26} textAnchor="middle" fontSize={14} fontWeight={800}
              fill="#9CA3AF" letterSpacing={1.2}>GENERATIVE MODEL EQUATIONS</text>

            {/* ── EQUATIONS: Level 3 ──────────────────────────────────────── */}
            {is3&&(<>
              <EqHeader x={EQX} y={rowV-28} text="LEVEL 3 — VOLATILITY" color={C.l3.stroke}/>
              <EqLine x={EQX} y={rowV-10} text="μ₃[k] ~ N( μ₃[k-1],  ϑ )" isMath/>
              <EqLine x={EQX} y={rowV+12} text="Evolving estimate of env. volatility"/>
              <EqLine x={EQX} y={rowV+34} text="LR of μ₂ ∝ exp( κ · μ₃ + ω₂ )"/>
            </>)}

            {/* ── EQUATIONS: Level 2 ──────────────────────────────────────── */}
            <EqHeader x={EQX} y={rowB-32} text="LEVEL 2 — BELIEF" color={C.l2.stroke}/>
            <EqLine x={EQX} y={rowB-14} text="μ₂[k] ~ N( μ₂[k-1],  exp(κ·μ₃ + ω₂) )" isMath/>
            <EqLine x={EQX} y={rowB+8}  text="P(dangerous) = σ( μ₂ )"/>
            <EqLine x={EQX} y={rowB+30} text="Updated via precision-weighted PE ε₂"/>
            {!is3&&<EqLine x={EQX} y={rowB+50} text={isMM?"multimodal: 2 obs · ω₂ only, no κ":"2-level: ω₂ only, no κ adaptation"} isNote/>}

            {/* ── EQUATIONS: Level 1 ──────────────────────────────────────── */}
            <EqHeader x={EQX} y={rowI-28} text={isMM?"OBSERVATION MODEL (MULTIMODAL)":"OBSERVATION MODEL"} color={C.l1.stroke}/>
            {isMM ? (<>
              <EqLine x={EQX} y={rowI-10} text="p(u₁=1 | μ₂) = σ( μ₂ )   → dangerous" isMath/>
              <EqLine x={EQX} y={rowI+14} text="p(u₂=1 | μ₂) = σ( μ₂ )   → secondary" isMath/>
              <EqLine x={EQX} y={rowI+38} text="Both u₁, u₂ update shared belief μ₂"/>
              <EqLine x={EQX} y={rowI+80} text="input_idxs = (0, 1)   input shape (T, 2)" isNote/>
            </>) : (<>
              <EqLine x={EQX} y={rowI-10} text="p(u=1 | μ₂) = σ( μ₂ )   → dangerous" isMath/>
              <EqLine x={EQX} y={rowI+14} text="p(u=0 | μ₂) = 1 − σ(μ₂) → safe" isMath/>
              <EqLine x={EQX} y={rowI+38} text="u ∈ {0,1}:  HGF input, drives belief update"/>
            </>)}

            {/* TEMPLATE-09 PARTIAL: generic placeholder only;
                 spec-derived rendering from NetworkSpec.response_model deferred to
                 Phase 24 pending schema extension. */}
            <EqHeader x={EQX} y={rowI+174} text="RESPONSE MODEL" color={C.resp.stroke}/>
            <EqLine x={EQX} y={rowI+192} text="Decision equation: rendered per response model (injected)" isNote/>

            {/* ── LEVEL 3: Volatility node ──────────────────────────────── */}
            {is3&&(()=>{
              const nc=nC("vol",C.l3);
              const [kex,key]=retract(CX,rowV,CX,rowB,27);
              const [ksx,ksy]=retract(CX,rowB,CX,rowV,33);
              const hlK=hlE("kappa_e"),colK=eC("kappa_e",C.eVol),swK=hlK?wVol+1.8:wVol;
              const kmx=(ksx+kex)/2,kmy=(ksy+key)/2;
              const tMidX3=Math.round((GX+20+CX-33)/2);
              return(<>
                <text x={18} y={rowV-22} fontSize={14} fontWeight={700} fill={C.l3.stroke} opacity={0.8}>LEVEL 3</text>

                {/* Ghost μ₃[k-1] node */}
                <polygon points={hexPts(GX,rowV,18)} fill={C.l3.fill} stroke={C.l3.stroke} strokeWidth={1.2} opacity={0.28}/>
                <text x={GX} y={rowV+1} textAnchor="middle" dominantBaseline="middle"
                  fontFamily="STIX Two Text,Georgia,serif" fontSize={15} fontWeight={600} fill={C.l3.text} opacity={0.35}>μ₃</text>
                <text x={GX} y={rowV+30} textAnchor="middle" fontSize={12} fill="#9CA3AF">[k−1]</text>

                {/* Temporal evolution arrow */}
                <line x1={GX+20} y1={rowV} x2={CX-33} y2={rowV}
                  stroke={C.l3.stroke} strokeWidth={1.4} strokeDasharray="5,3"
                  markerEnd="url(#atl3)" opacity={0.48}/>

                {/* ω₃ param */}
                <line x1={PX+13} y1={rowV-20} x2={tMidX3} y2={rowV}
                  stroke={C.ePrm} strokeWidth={1.2} strokeDasharray="3,2" markerEnd="url(#ap)"/>
                <PSq x={PX} y={rowV-20} pid="omega3" label="ω₃"/>

                {/* μ₃⁰ param */}
                <line x1={PX+13} y1={rowV+20} x2={tMidX3} y2={rowV}
                  stroke={C.ePrm} strokeWidth={1.2} strokeDasharray="3,2" markerEnd="url(#ap)"/>
                <PSq x={PX} y={rowV+20} pid="mu3_0" label="μ₃⁰"/>

                {/* κ coupling arrow */}
                <g onClick={e=>click("kappa_e",e)} style={{cursor:"pointer"}}>
                  <line x1={ksx} y1={ksy} x2={kex} y2={key} stroke="transparent" strokeWidth={16}/>
                  <line x1={ksx} y1={ksy} x2={kex} y2={key} stroke={colK} strokeWidth={swK}
                    strokeDasharray={hlK?"none":"8,4"} markerEnd={hlK?"url(#avo2)":"url(#avo)"} opacity={0.88}/>
                </g>
                <line x1={PX+13} y1={kmy} x2={CX-3} y2={kmy}
                  stroke={C.ePrm} strokeWidth={0.8} strokeDasharray="4,3" opacity={0.35}/>
                <PSq x={PX} y={kmy} pid="kappa" label="κ"/>

                {/* vol hexagon */}
                <g onClick={e=>click("vol",e)} style={{cursor:"pointer"}}>
                  {(hlN("vol")||sel==="vol")&&<polygon points={hexPts(CX,rowV,40)} fill="none" stroke={hlN("vol")?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlN("vol")?"none":"5,3"} opacity={0.55}/>}
                  <polygon points={hexPts(CX,rowV,30)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={CX} y={rowV-4} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={18} fontWeight={700} fill={nc.text}>μ₃</text>
                  <text x={CX} y={rowV+10} textAnchor="middle" fontSize={14} fill={nc.text} opacity={0.75}>vol</text>
                </g>
              </>);
            })()}

            {/* ── LEVEL 2: Belief node ──────────────────────────────────── */}
            {(()=>{
              const nc=nC("belief",C.l2);
              const tMidX2=Math.round((GX+18+CX-26)/2);
              return(<>
                <text x={18} y={rowB-26} fontSize={14} fontWeight={700} fill={C.l2.stroke} opacity={0.8}>LEVEL 2</text>

                {/* Ghost μ₂[k-1] node */}
                <circle cx={GX} cy={rowB} r={16} fill={C.l2.fill} stroke={C.l2.stroke} strokeWidth={1.2} opacity={0.28}/>
                <text x={GX} y={rowB+1} textAnchor="middle" dominantBaseline="middle"
                  fontFamily="STIX Two Text,Georgia,serif" fontSize={15} fontWeight={600} fill={C.l2.text} opacity={0.35}>μ₂</text>
                <text x={GX} y={rowB+30} textAnchor="middle" fontSize={12} fill="#9CA3AF">[k−1]</text>

                {/* Temporal evolution arrow */}
                <line x1={GX+18} y1={rowB} x2={CX-26} y2={rowB}
                  stroke={C.l2.stroke} strokeWidth={1.4} strokeDasharray="5,3"
                  markerEnd="url(#atl2)" opacity={0.48}/>

                {/* ω₂ param */}
                <g onClick={e=>click("omega2",e)} style={{cursor:"pointer"}}>
                  <line x1={PX+13} y1={rowB-20} x2={tMidX2} y2={rowB}
                    stroke={C.ePrm} strokeWidth={1.2} strokeDasharray="3,2" markerEnd="url(#ap)"/>
                  <PSq x={PX} y={rowB-20} pid="omega2" label="ω₂"/>
                </g>

                <g onClick={e=>click("belief",e)} style={{cursor:"pointer"}}>
                  <circle cx={CX} cy={rowB} r={31} fill="none" stroke={C.l2.stroke} strokeWidth={1} strokeDasharray="5,3" opacity={0.25}/>
                  {(hlN("belief")||sel==="belief")&&<circle cx={CX} cy={rowB} r={34} fill="none" stroke={hlN("belief")?"#CC7700":"#2563EB"} strokeWidth={2} strokeDasharray={hlN("belief")?"none":"5,3"} opacity={0.55}/>}
                  <circle cx={CX} cy={rowB} r={24} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={CX} y={rowB-3} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={18} fontWeight={700} fill={nc.text}>μ₂</text>
                  <text x={CX} y={rowB+11} textAnchor="middle" fontSize={14} fill={nc.text} opacity={0.75}>P(danger)</text>
                </g>
              </>);
            })()}

            {/* ── Value coupling ────────────────────────────────────────── */}
            {(()=>{
              const hl=hlE("val"),col=eC("val",C.eVal),sw=hl?wVal+1.5:wVal;
              if(isMM){
                const u1x=CX-70, u2x=CX+70;
                const [e1x,e1y]=retract(CX,rowB,u1x,rowI,22);
                const [e2x,e2y]=retract(CX,rowB,u2x,rowI,22);
                const [s1x,s1y]=retract(u1x,rowI,CX,rowB,22);
                const [s2x,s2y]=retract(u2x,rowI,CX,rowB,22);
                return(<g onClick={e=>click("val",e)} style={{cursor:"pointer"}}>
                  <line x1={s1x} y1={s1y} x2={e1x} y2={e1y} stroke="transparent" strokeWidth={14}/>
                  <line x1={s1x} y1={s1y} x2={e1x} y2={e1y} stroke={col} strokeWidth={sw}
                    markerEnd={hl?"url(#av2)":"url(#av)"} opacity={0.88}/>
                  <line x1={s2x} y1={s2y} x2={e2x} y2={e2y} stroke="transparent" strokeWidth={14}/>
                  <line x1={s2x} y1={s2y} x2={e2x} y2={e2y} stroke={col} strokeWidth={sw}
                    markerEnd={hl?"url(#av2)":"url(#av)"} opacity={0.88}/>
                </g>);
              }
              return(<g onClick={e=>click("val",e)} style={{cursor:"pointer"}}>
                <line x1={CX} y1={rowB+25} x2={CX} y2={rowI-25} stroke="transparent" strokeWidth={14}/>
                <line x1={CX} y1={rowB+25} x2={CX} y2={rowI-25} stroke={col} strokeWidth={sw}
                  markerEnd={hl?"url(#av2)":"url(#av)"} opacity={0.88}/>
              </g>);
            })()}

            {/* ── LEVEL 1: Binary input ─────────────────────────────────── */}
            {(()=>{
              const nc=nC("input",C.l1);
              const offsets=[{dx:-14,dy:3,op:0.25},{dx:-7,dy:1.5,op:0.45},{dx:0,dy:0,op:1}];

              if(isMM){
                const u1x=CX-70, u2x=CX+70;
                return(<>
                  <text x={18} y={rowI-22} fontSize={14} fontWeight={700} fill={C.l1.stroke} opacity={0.8}>LEVEL 1 — MULTIMODAL</text>
                  {offsets.slice(0,2).map((o,i)=>(
                    <polygon key={i} points={diamPts(u1x+o.dx,rowI+o.dy,22,17)}
                      fill={C.l1.fill} stroke={C.l1.stroke} strokeWidth={1.5} opacity={o.op}/>
                  ))}
                  <g onClick={e=>click("input",e)} style={{cursor:"pointer"}}>
                    {sel==="input"&&<polygon points={diamPts(u1x,rowI,28,22)} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.5}/>}
                    <polygon points={diamPts(u1x,rowI,22,17)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                    <text x={u1x} y={rowI+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={15} fontWeight={700} fill={nc.text}>u₁</text>
                  </g>
                  <text x={u1x} y={rowI+28} textAnchor="middle" fontSize={13} fill="#6B7280">primary obs.</text>
                  {offsets.slice(0,2).map((o,i)=>(
                    <polygon key={i+10} points={diamPts(u2x+o.dx,rowI+o.dy,22,17)}
                      fill={C.l1.fill} stroke={C.l1.stroke} strokeWidth={1.5} opacity={o.op}/>
                  ))}
                  <g onClick={e=>click("input",e)} style={{cursor:"pointer"}}>
                    <polygon points={diamPts(u2x,rowI,22,17)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                    <text x={u2x} y={rowI+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={15} fontWeight={700} fill={nc.text}>u₂</text>
                  </g>
                  <text x={u2x} y={rowI+28} textAnchor="middle" fontSize={13} fill="#6B7280">secondary obs.</text>
                  <text x={CX} y={rowI+44} textAnchor="middle" fontSize={14} fill="#9CA3AF">both drive shared μ₂</text>
                  <path d={`M${u1x+22},${rowI} L${CX},${rowI-6} L${u2x-22},${rowI}`}
                    fill="none" stroke={C.l1.stroke} strokeWidth={0.8} opacity={0.3} strokeDasharray="3,2"/>
                </>);
              }

              return(<>
                <text x={18} y={rowI-22} fontSize={14} fontWeight={700} fill={C.l1.stroke} opacity={0.8}>LEVEL 1</text>
                {offsets.slice(0,2).map((o,i)=>(
                  <polygon key={i} points={diamPts(CX+o.dx,rowI+o.dy,24,19)}
                    fill={C.l1.fill} stroke={C.l1.stroke} strokeWidth={1.5} opacity={o.op}/>
                ))}
                <g onClick={e=>click("input",e)} style={{cursor:"pointer"}}>
                  {sel==="input"&&<polygon points={diamPts(CX,rowI,30,24)} fill="none" stroke="#2563EB" strokeWidth={1.5} strokeDasharray="4,2" opacity={0.5}/>}
                  <polygon points={diamPts(CX,rowI,24,19)} fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                  <text x={CX} y={rowI+1} textAnchor="middle" dominantBaseline="middle" fontFamily="STIX Two Text,Georgia,serif" fontSize={16} fontWeight={700} fill={nc.text}>u</text>
                </g>
                <text x={CX-6} y={rowI+32} textAnchor="middle" fontSize={15} fill="#6B7280" fontWeight={500}>safe (0) / dangerous (1)</text>
              </>);
            })()}

            {/* ── EV → response arrow (decision pathway, generic) ─────────── */}
            {(()=>{
              const col=C.eRsp,sw=wEV;
              const y1=rowB+25, y2=respY-26;
              return(<g onClick={e=>click("ev_resp",e)} style={{cursor:"pointer"}}>
                <line x1={CX} y1={y1} x2={CX} y2={y2} stroke="transparent" strokeWidth={14}/>
                <line x1={CX} y1={y1} x2={CX} y2={y2} stroke={col} strokeWidth={sw}
                  markerEnd="url(#ar)" opacity={0.85}/>
                <text x={CX+6} y={(y1+y2)/2+4} fontSize={12} fill={col} opacity={0.75}>decision</text>
              </g>);
            })()}

            {/* ── Response model (TEMPLATE-09 PARTIAL: generic placeholder) ────────── */}
            <line x1={28} y1={respY-45} x2={SW_D-28} y2={respY-45} stroke="#D1D5DB" strokeWidth={1.5} strokeDasharray="9,5"/>
            <text x={SW_D/2} y={respY-32} textAnchor="middle" fontSize={14} fill="#9CA3AF" fontWeight={600} letterSpacing={1.5}>RESPONSE / DECISION MODEL</text>

            {(()=>{
              const ry=respY, bx=110;
              const respPs=[
                {pid:"beta",  label:"β", val:beta.toFixed(1)},
                {pid:"b",     label:"b", val:b.toFixed(2)},
              ];
              return(<>{respPs.map((p,i)=>{
                const py=ry-2+i*26;
                return(<g key={p.pid} onClick={e=>click(p.pid,e)} style={{cursor:"pointer"}}>
                  <line x1={PX+13} y1={py} x2={bx} y2={py}
                    stroke={C.ePrm} strokeWidth={1.0} strokeDasharray="3,2" opacity={0.48}/>
                  <PSq x={PX} y={py} pid={p.pid} label={p.label}/>
                </g>);
              })}</>);
            })()}

            {(()=>{
              const ry=respY, nc=nC("resp",C.resp), bx=110, bw=SW_D-110-25;
              return(<g onClick={e=>click("resp",e)} style={{cursor:"pointer"}}>
                {sel==="resp"&&<rect x={bx-7} y={ry-26} width={bw+14} height={76} rx={13}
                  fill="none" stroke="#2563EB" strokeWidth={2}
                  strokeDasharray="5,3" opacity={0.55}/>}
                <rect x={bx} y={ry-20} width={bw} height={66} rx={10}
                  fill={nc.fill} stroke={nc.stroke} strokeWidth={1.8}/>
                <text x={bx+bw/2} y={ry+1} textAnchor="middle"
                  fontSize={15} fontWeight={500} fill={nc.text}>{formula}</text>
              </g>);
            })()}

          </svg>
        </div>

        {/* Info panel — only when a node/edge is clicked */}
        {displayInfo&&<div style={{background:"#fff",borderRadius:10,padding:"13px 17px",
          border:"1.5px solid #E5E7EB",
          boxShadow:"0 1px 4px rgba(0,0,0,0.05)",flex:"0 0 auto"}}>
          <div style={{fontWeight:700,fontSize:20,marginBottom:5,color:"#111827"}}>
            {displayInfo.title}
          </div>
          <div style={{fontSize:18,color:"#4B5563",lineHeight:1.68,whiteSpace:"pre-line"}}>
            {displayInfo.body}
          </div>
        </div>}
      </div>
    </div>
  );
}

// ── Helper components ──────────────────────────────────────────────────────────
function Blk({title,children}){
  return<div style={{marginBottom:18}}>
    <div style={{fontSize:14,fontWeight:800,letterSpacing:1.2,color:"#9CA3AF",textTransform:"uppercase",marginBottom:8}}>{title}</div>
    {children}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
