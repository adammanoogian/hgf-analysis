project:
  type: manuscript

manuscript:
  article: paper.qmd

format:
  html: default
  arxiv-pdf:
    keep-tex: true

jupyter: python3

execute:
  echo: false
  # Set cache: false during active development.
  # Quarto cache does NOT detect changes in external CSV files.
  # After results stabilize, switch to cache: true and use
  # quarto render --cache-refresh paper.qmd when results change.
  cache: false
